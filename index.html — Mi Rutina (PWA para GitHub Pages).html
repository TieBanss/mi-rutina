<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ---- almacenamiento local (localStorage, con try/catch) ---- */
const STORE = {
  get(k) {
    try {
      const v = localStorage.getItem(k);
      return v == null ? null : v;
    } catch (e) {
      return null;
    }
  },
  set(k, v) {
    try {
      localStorage.setItem(k, v);
    } catch (e) {}
  },
};

const uid = () =>
  Math.random().toString(36).slice(2, 9) + Date.now().toString(36);

const RING_R = 24;
const RING_C = 2 * Math.PI * RING_R;
const BIG_R = 64;
const BIG_C = 2 * Math.PI * BIG_R;
const PRESETS = [45, 60, 90, 120];
const STEPS = [-2.5, -0.5, 0.5, 2.5];

          mk({ name: "Chest press", sub: "Máquina", sets: 3, reps: "10–12", weight: "11.5 kg", tip: "Peso fijo. No subas hasta completar las 12 reps en las 3 series con postura perfecta." }),
          mk({ name: "Seated fly", sub: "Aperturas en máquina", sets: 3, reps: "12–15", weight: "20 kg", tip: "Busca el bombeo y la tensión en el pecho, sin impulso de la espalda." }),

        ],

      {

          mk({ name: "Leg press", sub: "Prensa", sets: 4, reps: "10–12", weight: "10 kg / lado", tip: "Un peso que te permita 10 reps sólidas en la 4ª serie." }),

function parseWeight(w) {
  const m = String(w).match(/^\s*(\d+(?:[.,]\d+)?)\s*(.*)$/);
  if (m) return { num: parseFloat(m[1].replace(",", ".")), suffix: m[2].trim() };
  return { num: null, suffix: String(w) };
}
function fmtNum(n) {
  return Number.isInteger(n) ? String(n) : String(parseFloat(n.toFixed(2)));
}
function compose(n, suffix) {
  return suffix ? `${fmtNum(n)} ${suffix}` : fmtNum(n);
}
function formatDate(t) {
  const d = new Date(t);
  const now = new Date();
  const opts = { day: "2-digit", month: "short" };
  if (d.getFullYear() !== now.getFullYear()) opts.year = "numeric";
  return d.toLocaleDateString("es-ES", opts);
}

/* ---------- Historial ---------- */
function HistoryPanel({ entries, onClear }) {
  const nums = entries.filter((e) => e.n != null);
  let spark = null;
  if (nums.length >= 2) {
    const vals = nums.map((e) => e.n);
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const span = max - min || 1;
    const poly = nums
      .map((e, i) => {
        const x = (i / (nums.length - 1)) * 96 + 2;
        const y = 28 - ((e.n - min) / span) * 22;
        return `${x.toFixed(1)},${y.toFixed(1)}`;
      })
      .join(" ");
    spark = (
      <svg className="spark" viewBox="0 0 100 32" preserveAspectRatio="none">
        <polyline points={poly} className="spark-line" fill="none" />
      </svg>
    );
  }
  const rows = entries.slice().reverse();
  return (
    <div className="hist">
      {spark}
      <div className="hist-list">
        {rows.map((e, idx) => {
          const older = rows[idx + 1];
          const delta =
            e.n != null && older && older.n != null ? e.n - older.n : null;
          return (
            <div className="hist-row" key={e.t + "-" + idx}>
              <span className="hist-date">{formatDate(e.t)}</span>
              <span className="hist-w">
                {e.w}
                {e.reps != null ? (
                  <span className="hist-reps"> · {e.reps} reps</span>
                ) : null}
              </span>
              {delta != null && delta !== 0 ? (
                <span className={"hist-delta" + (delta > 0 ? " up" : " down")}>
                  {delta > 0 ? "+" : "−"}
                  {fmtNum(Math.abs(delta))}
                </span>
              ) : (
                <span className="hist-delta" />
              )}
            </div>
          );
        })}
      </div>
      <button className="hist-clear" onClick={onClear}>
        Borrar historial
      </button>
    </div>
  );
}

/* ---------- Formulario de ejercicio ---------- */
function ExerciseForm({ initial, globalRest, onSave, onCancel, onDelete }) {
  const [f, setF] = useState({
    name: initial?.name || "",
    sub: initial?.sub || "",
    tip: initial?.tip || "",
    sets: initial?.sets != null ? String(initial.sets) : "3",
    reps: initial?.reps || "10–12",
    weight: initial?.weight || "",
    rest: initial?.rest != null ? String(initial.rest) : "",
  });
  const [confirmDel, setConfirmDel] = useState(false);
  const upd = (k) => (e) => setF({ ...f, [k]: e.target.value });

  function save() {
    if (!f.name.trim()) return;
    let weight = f.weight.trim() || "—";
    if (/^\d+([.,]\d+)?$/.test(weight)) weight = weight.replace(",", ".") + " kg";
    const sets = Math.min(12, Math.max(1, parseInt(f.sets, 10) || 3));
    const restN = f.rest.trim() === "" ? null : Math.max(5, parseInt(f.rest, 10) || globalRest);
    onSave({
      name: f.name.trim(),
      sub: f.sub.trim(),
      tip: f.tip.trim(),
      sets,
      reps: f.reps.trim() || "10",
      weight,
      rest: restN,
    });
  }

  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-title">
          {initial ? "Editar ejercicio" : "Nuevo ejercicio"}
        </div>
        <label className="f-label">Nombre *</label>
        <input className="f-input" value={f.name} onChange={upd("name")} placeholder="Ej: Press de banca" />
        <label className="f-label">Máquina / subtítulo</label>
        <input className="f-input" value={f.sub} onChange={upd("sub")} placeholder="Ej: Máquina, mancuernas…" />
        <label className="f-label">Descripción / consejo</label>
        <textarea className="f-input area" value={f.tip} onChange={upd("tip")} placeholder="Técnica, notas…" rows={2} />
        <div className="f-grid">
          <div>
            <label className="f-label">Series</label>
            <input className="f-input" inputMode="numeric" value={f.sets} onChange={(e) => setF({ ...f, sets: e.target.value.replace(/[^\d]/g, "") })} />
          </div>
          <div>
            <label className="f-label">Reps</label>
            <input className="f-input" value={f.reps} onChange={upd("reps")} placeholder="10–12" />
          </div>
        </div>
        <div className="f-grid">
          <div>
            <label className="f-label">Peso (kg)</label>
            <input className="f-input" value={f.weight} onChange={upd("weight")} placeholder="Ej: 20" />
          </div>
          <div>
            <label className="f-label">Descanso (s)</label>
            <input className="f-input" inputMode="numeric" value={f.rest} onChange={(e) => setF({ ...f, rest: e.target.value.replace(/[^\d]/g, "") })} placeholder={`Global (${globalRest}s)`} />
          </div>
        </div>
        <div className="modal-actions">
          {onDelete &&
            (confirmDel ? (
              <button className="m-btn danger" onClick={onDelete}>
                ¿Seguro? Eliminar
              </button>
            ) : (
              <button className="m-btn ghost" onClick={() => setConfirmDel(true)}>
                Eliminar
              </button>
            ))}
          <div className="modal-actions-right">
            <button className="m-btn ghost" onClick={onCancel}>
              Cancelar
            </button>
            <button className="m-btn primary" onClick={save} disabled={!f.name.trim()}>
              Guardar
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Modo entrenamiento ---------- */
function WorkoutOverlay({
  ex,
  doneArr,
  restSec,
  onMarkSet,
  onClose,
  onFinishLog,
  nextEx,
  onNext,
  ensureAudio,
  fireAlarm,
}) {
  const total = ex.sets;
  const firstInc = doneArr.findIndex((d) => !d);
  const [phase, setPhase] = useState(firstInc === -1 ? "done" : "work");
  const [setIdx, setSetIdx] = useState(firstInc === -1 ? total - 1 : firstInc);
  const [remaining, setRemaining] = useState(0);
  const [restTotal, setRestTotal] = useState(restSec);
  const [endAt, setEndAt] = useState(null);
  const [running, setRunning] = useState(false);
  const [reps, setReps] = useState("");

  function completeSet() {
    ensureAudio();
    onMarkSet(setIdx);
    if (setIdx >= total - 1) {
      setPhase("done");
      setRunning(false);
      setEndAt(null);
    } else {
      setRestTotal(restSec);
      setRemaining(restSec);
      setEndAt(Date.now() + restSec * 1000);
      setRunning(true);
      setPhase("rest");
    }
  }
  function advance() {
    setRunning(false);
    setEndAt(null);
    setRemaining(0);
    setSetIdx((i) => Math.min(total - 1, i + 1));
    setPhase("work");
  }
  function addTime(s) {
    if (running) {
      setEndAt((e) => (e || Date.now()) + s * 1000);
      setRestTotal((t) => t + s);
    } else {
      setRemaining((r) => r + s);
      setRestTotal((t) => t + s);
    }
  }
  function pauseResume() {
    if (running) {
      setRemaining(Math.max(0, (endAt - Date.now()) / 1000));
      setRunning(false);
      setEndAt(null);
    } else if (remaining > 0) {
      ensureAudio();
      setEndAt(Date.now() + remaining * 1000);
      setRunning(true);
    }
  }

  useEffect(() => {
    if (!running || endAt == null) return;
    const id = setInterval(() => {
      const rem = Math.max(0, (endAt - Date.now()) / 1000);
      if (rem <= 0) {
        clearInterval(id);
        fireAlarm();
        advance();
      } else {
        setRemaining(rem);
      }
    }, 150);
    return () => clearInterval(id);
  }, [running, endAt]);

  const dispSec = Math.ceil(remaining);
  const mm = Math.floor(dispSec / 60);
  const ss = String(dispSec % 60).padStart(2, "0");
  const frac = restTotal > 0 ? Math.min(1, Math.max(0, remaining / restTotal)) : 0;

  return (
    <div className="overlay">
      <div className="ov-top">
        <button className="ov-close" onClick={onClose}>✕</button>
        <div className="ov-exname">{ex.name}</div>
        <div className="ov-sub">{ex.sub ? ex.sub + " · " : ""}{ex.weight}</div>
      </div>

      <div className="ov-dots">
        {doneArr.map((d, i) => (
          <span
            key={i}
            className={"ov-dot" + (d ? " done" : "") + (phase !== "done" && i === setIdx ? " cur" : "")}
          />
        ))}
      </div>

      {phase === "work" && (
        <div className="ov-body">
          <div className="ov-label">Serie</div>
          <div className="ov-big">{setIdx + 1}<span className="ov-of">/ {total}</span></div>
          <div className="ov-target"><span className="ov-target-num">{ex.reps}</span> reps · {ex.weight}</div>
          {ex.tip ? <div className="ov-tip">{ex.tip}</div> : null}
          <button className="ov-main" onClick={completeSet}>✓ Serie completada</button>
        </div>
      )}

      {phase === "rest" && (
        <div className="ov-body">
          <div className="ov-label rest">Descanso</div>
          <div className="ov-ring-wrap">
            <svg width="160" height="160" viewBox="0 0 160 160">
              <circle cx="80" cy="80" r={BIG_R} className="ring-bg" fill="none" strokeWidth="10" />
              <circle cx="80" cy="80" r={BIG_R} className="ring-fg" fill="none" strokeWidth="10"
                strokeDasharray={BIG_C} strokeDashoffset={BIG_C * (1 - frac)} transform="rotate(-90 80 80)" />
            </svg>
            <div className="ov-ring-time">{mm}:{ss}</div>
          </div>
          <div className="ov-next">Siguiente: serie {Math.min(setIdx + 2, total)} de {total}</div>
          <div className="ov-rest-controls">
            <button className="t-btn" onClick={() => addTime(15)}>+15s</button>
            <button className="t-btn" onClick={pauseResume}>{running ? "Pausa" : "Seguir"}</button>
            <button className="t-btn primary" onClick={advance}>Saltar →</button>
          </div>
        </div>
      )}

      {phase === "done" && (
        <div className="ov-body">
          <div className="ov-big small">💪</div>
          <div className="ov-done-title">¡Ejercicio completado!</div>
          <div className="ov-target">{total} series · {ex.weight}</div>
          <div className="ov-reps">
            <div className="ov-reps-label">
              Reps logradas en la última serie
              <span className="ed-reps-goal">objetivo {ex.reps}</span>
            </div>
            <div className="ed-reps-ctrl">
              <button className="rep-step" onClick={() => setReps(String(Math.max(0, (parseInt(reps) || 0) - 1)))}>−</button>
              <input className="ed-input reps" inputMode="numeric" value={reps} placeholder="—"
                onChange={(e) => setReps(e.target.value.replace(/[^\d]/g, ""))} />
              <button className="rep-step" onClick={() => setReps(String((parseInt(reps) || 0) + 1))}>+</button>
            </div>
          </div>
          {nextEx ? (
            <button className="ov-main" onClick={() => { onFinishLog(reps); onNext(); }}>
              Siguiente: {nextEx.name} →
            </button>
          ) : null}
          <button className={"ov-main" + (nextEx ? " secondary" : "")} onClick={() => { onFinishLog(reps); onClose(); }}>
            {nextEx ? "Finalizar" : "🎉 Terminar — ¡día completo!"}
          </button>
        </div>
      )}
    </div>
  );
}

/* ---------- App ---------- */
function App() {
  const [routine, setRoutine] = useState(() => {
    const v = STORE.get("routine_v2");
    if (v) {
      try {
        const r = JSON.parse(v);
        if (r && r.days && r.days.length) return r;
      } catch (e) {}
    }
    const r = buildDefaultRoutine();
    STORE.set("routine_v2", JSON.stringify(r));
    return r;
  });
  const [history, setHistory] = useState(() => {
    const v = STORE.get("history_v2");
    if (v) { try { return JSON.parse(v); } catch (e) {} }
    return {};
  });
  const [settings, setSettings] = useState(() => {
    const base = { globalRest: 90, autoRest: true, soundOn: true };
    const v = STORE.get("settings_v2");
    if (v) { try { return { ...base, ...JSON.parse(v) }; } catch (e) {} }
    return base;
  });

  const [dayIdx, setDayIdx] = useState(0);
  const [setsDone, setSetsDone] = useState({});

  const [editingEx, setEditingEx] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [editSuffix, setEditSuffix] = useState("");
  const [editNumeric, setEditNumeric] = useState(true);
  const [editStart, setEditStart] = useState("");
  const [editReps, setEditReps] = useState("");

  const [histOpen, setHistOpen] = useState(null);
  const [summaryOpen, setSummaryOpen] = useState(false);
  const [gearOpen, setGearOpen] = useState(false);

  const [exForm, setExForm] = useState(null);
  const [dayForm, setDayForm] = useState(null);
  const [workoutExId, setWorkoutExId] = useState(null);

  const [total, setTotal] = useState(0);
  const [remaining, setRemaining] = useState(0);
  const [endAt, setEndAt] = useState(null);
  const [running, setRunning] = useState(false);
  const audioRef = useRef(null);

  function persistRoutine(next) {
    setRoutine(next);
    STORE.set("routine_v2", JSON.stringify(next));
  }
  function persistHistory(next) {
    setHistory(next);
    STORE.set("history_v2", JSON.stringify(next));
  }
  function updSettings(patch) {
    const next = { ...settings, ...patch };
    setSettings(next);
    STORE.set("settings_v2", JSON.stringify(next));
  }

  const safeDayIdx = Math.min(dayIdx, routine.days.length - 1);
  const day = routine.days[safeDayIdx];

  function updateExercise(exId, patch) {
    const next = {
      ...routine,
      days: routine.days.map((d) => ({
        ...d,
        exercises: d.exercises.map((e) => (e.id === exId ? { ...e, ...patch } : e)),
      })),
    };
    persistRoutine(next);
    return next;
  }
  function addExercise(data) {
    const ex = { id: uid(), ...data };
    const next = {
      ...routine,
      days: routine.days.map((d, i) =>
        i === safeDayIdx ? { ...d, exercises: [...d.exercises, ex] } : d
      ),
    };
    persistRoutine(next);
  }
  function deleteExercise(exId) {
    const next = {
      ...routine,
      days: routine.days.map((d) => ({
        ...d,
        exercises: d.exercises.filter((e) => e.id !== exId),
      })),
    };
    persistRoutine(next);
    const nh = { ...history };
    delete nh[exId];
    persistHistory(nh);
    if (workoutExId === exId) setWorkoutExId(null);
  }
  function moveExercise(exId, dir) {
    const exs = day.exercises.slice();
    const i = exs.findIndex((e) => e.id === exId);
    const j = i + dir;
    if (i < 0 || j < 0 || j >= exs.length) return;
    [exs[i], exs[j]] = [exs[j], exs[i]];
    const next = {
      ...routine,
      days: routine.days.map((d, k) => (k === safeDayIdx ? { ...d, exercises: exs } : d)),
    };
    persistRoutine(next);
  }
  function addDay(data) {
    const next = { ...routine, days: [...routine.days, { id: uid(), ...data, exercises: [] }] };
    persistRoutine(next);
    setDayIdx(next.days.length - 1);
  }
  function updateDay(data) {
    const next = {
      ...routine,
      days: routine.days.map((d, i) => (i === safeDayIdx ? { ...d, ...data } : d)),
    };
    persistRoutine(next);
  }
  function deleteDay() {
    if (routine.days.length <= 1) return;
    const removed = routine.days[safeDayIdx];
    const next = { ...routine, days: routine.days.filter((_, i) => i !== safeDayIdx) };
    const nh = { ...history };
    removed.exercises.forEach((e) => delete nh[e.id]);
    persistRoutine(next);
    persistHistory(nh);
    setDayIdx(Math.max(0, safeDayIdx - 1));
    setDayForm(null);
  }

  function getArr(ex) {
    const a = setsDone[ex.id] || [];
    return Array.from({ length: ex.sets }, (_, i) => !!a[i]);
  }
  function toggleSet(ex, si) {
    const arr = getArr(ex).slice();
    const wasDone = arr[si];
    arr[si] = !arr[si];
    setSetsDone((s) => ({ ...s, [ex.id]: arr }));
    if (!wasDone && settings.autoRest && workoutExId == null)
      startTimer(ex.rest != null ? ex.rest : settings.globalRest);
  }
  function markSetDone(exId, si) {
    const ex = day.exercises.find((e) => e.id === exId);
    if (!ex) return;
    const arr = getArr(ex).slice();
    arr[si] = true;
    setSetsDone((s) => ({ ...s, [exId]: arr }));
  }
  function resetDay() {
    setSetsDone((s) => {
      const next = { ...s };
      day.exercises.forEach((e) => delete next[e.id]);
      return next;
    });
  }

  function appendHistory(exId, w, reps) {
    const arr = history[exId] || [];
    const r = reps == null || reps === "" ? null : parseInt(reps, 10);
    const rr = r != null && !isNaN(r) ? r : null;
    const last = arr[arr.length - 1];
    if (last && last.w === w && (last.reps ?? null) === rr) return;
    const p = parseWeight(w);
    persistHistory({ ...history, [exId]: [...arr, { t: Date.now(), w, n: p.num, reps: rr }] });
  }
  function clearHistory(exId) {
    const next = { ...history };
    delete next[exId];
    persistHistory(next);
    setHistOpen(null);
  }

  function exById(exId) {
    for (const d of routine.days)
      for (const e of d.exercises) if (e.id === exId) return e;
    return null;
  }
  function finalizeEdit() {
    if (editingEx == null) return;
    const ex = exById(editingEx);
    if (!ex) return;
    const cur = ex.weight;
    const repsNum = parseInt(String(editReps).replace(/[^\d]/g, ""), 10);
    const reps = isNaN(repsNum) ? null : repsNum;
    const weightChanged = cur && cur !== editStart;
    if (weightChanged || reps != null) appendHistory(editingEx, cur, reps);
  }
  function closeEditor() { finalizeEdit(); setEditingEx(null); }
  function openEditor(ex) {
    finalizeEdit();
    const p = parseWeight(ex.weight);
    setEditStart(ex.weight);
    setEditReps("");
    setEditingEx(ex.id);
    setEditNumeric(p.num !== null);
    setEditSuffix(p.num !== null ? p.suffix : "");
    setEditVal(p.num !== null ? fmtNum(p.num) : ex.weight);
  }
  function commitNumeric(str) {
    setEditVal(str);
    const n = parseFloat(String(str).replace(",", "."));
    if (!isNaN(n)) updateExercise(editingEx, { weight: compose(n, editSuffix) });
  }
  function stepBy(d) {
    const cur = parseFloat(String(editVal).replace(",", ".")) || 0;
    const n = Math.max(0, Math.round((cur + d) * 100) / 100);
    setEditVal(fmtNum(n));
    updateExercise(editingEx, { weight: compose(n, editSuffix) });
  }
  function commitText(v) { setEditVal(v); updateExercise(editingEx, { weight: v }); }
  function changeDay(i) {
    finalizeEdit();
    setEditingEx(null);
    setHistOpen(null);
    setSummaryOpen(false);
    setDayIdx(i);
  }

  function ensureAudio() {
    try {
      if (!audioRef.current) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioRef.current = new Ctx();
      }
      if (audioRef.current && audioRef.current.state === "suspended")
        audioRef.current.resume();
    } catch (e) {}
  }
  function fireAlarm() {
    if (navigator.vibrate) { try { navigator.vibrate([220, 120, 220, 120, 220]); } catch (e) {} }
    if (!settings.soundOn) return;
    try {
      const ctx = audioRef.current;
      if (!ctx) return;
      [0, 0.28, 0.56].forEach((t) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = "sine"; o.frequency.value = 920;
        const start = ctx.currentTime + t;
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.35, start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, start + 0.22);
        o.start(start); o.stop(start + 0.24);
      });
    } catch (e) {}
  }

  function startTimer(sec) {
    ensureAudio();
    setTotal(sec); setRemaining(sec);
    setEndAt(Date.now() + sec * 1000); setRunning(true);
  }
  function pauseResume() {
    if (running) {
      setRemaining(Math.max(0, (endAt - Date.now()) / 1000));
      setRunning(false); setEndAt(null);
    } else if (remaining > 0) {
      ensureAudio();
      setEndAt(Date.now() + remaining * 1000); setRunning(true);
    }
  }
  function addTime(sec) {
    if (running) { setEndAt((e) => (e || Date.now()) + sec * 1000); setTotal((t) => t + sec); }
    else { setRemaining((r) => r + sec); setTotal((t) => Math.max(t, remaining + sec)); }
  }
  function stopTimer() { setRunning(false); setEndAt(null); setRemaining(0); setTotal(0); }

  useEffect(() => {
    if (!running || endAt == null) return;
    const id = setInterval(() => {
      const rem = Math.max(0, (endAt - Date.now()) / 1000);
      if (rem <= 0) {
        clearInterval(id);
        setRemaining(0); setRunning(false); setEndAt(null);
        fireAlarm();
      } else { setRemaining(rem); }
    }, 150);
    return () => clearInterval(id);
  }, [running, endAt, settings.soundOn]);

  const doneCount = day.exercises.reduce((acc, ex) => acc + getArr(ex).filter(Boolean).length, 0);
  const totalCount = day.exercises.reduce((acc, ex) => acc + ex.sets, 0);
  const dayDone = totalCount > 0 && doneCount === totalCount;

  const summary = (() => {
    const rows = [];
    const totals = {};
    let progressed = 0;
    day.exercises.forEach((ex) => {
      const h = history[ex.id];
      if (!h || h.length === 0) return;
      const numEntries = h.filter((e) => e.n != null);
      const startN = numEntries.length ? numEntries[0].n : null;
      const p = parseWeight(ex.weight);
      const curN = p.num;
      const suffix = p.suffix;
      const gain = startN != null && curN != null ? Math.round((curN - startN) * 100) / 100 : null;
      const repsEntries = h.filter((e) => e.reps != null);
      const startReps = repsEntries.length ? repsEntries[0].reps : null;
      const lastReps = repsEntries.length ? repsEntries[repsEntries.length - 1].reps : null;
      const repsGain = startReps != null && lastReps != null ? lastReps - startReps : null;
      const startStr = numEntries.length ? compose(startN, suffix) : h[0].w;
      const improved = (gain != null && gain > 0) || (repsGain != null && repsGain > 0);
      if (improved) progressed++;
      if (gain != null && gain !== 0 && suffix)
        totals[suffix] = Math.round(((totals[suffix] || 0) + gain) * 100) / 100;
      rows.push({ id: ex.id, name: ex.name, startStr, curStr: ex.weight, gain, repsGain });
    });
    return { rows, totals, progressed };
  })();

  const workoutEx = workoutExId ? day.exercises.find((e) => e.id === workoutExId) : null;
  let nextEx = null;
  if (workoutEx) {
    const idx = day.exercises.findIndex((e) => e.id === workoutExId);
    const ordered = [...day.exercises.slice(idx + 1), ...day.exercises.slice(0, idx)];
    nextEx = ordered.find((e) => getArr(e).some((d) => !d)) || null;
  }

  const active = running || remaining > 0;
  const displaySec = Math.ceil(remaining);
  const mm = Math.floor(displaySec / 60);
  const ss = String(displaySec % 60).padStart(2, "0");
  const frac = total > 0 ? Math.min(1, Math.max(0, remaining / total)) : 0;

  return (
    <div className="wrap">
      <style>{CSS}</style>

      <header className="top">
        <div className="brand"><span className="brand-mark">●</span> Mi Rutina</div>
        <div className="days">
          {routine.days.map((d, i) => (
            <button key={d.id} className={"day-btn" + (i === safeDayIdx ? " on" : "")} onClick={() => changeDay(i)}>
              <span className="day-n">Día {i + 1}</span>
              <span className="day-f">{d.focus}</span>
            </button>
          ))}
          <button className="day-btn add" onClick={() => setDayForm({ mode: "new" })} aria-label="Agregar día">
            <span className="day-n">＋</span>
            <span className="day-f">Día</span>
          </button>
        </div>

        <div className="focus-line">
          {day.body || day.focus}
          <button className="day-edit" onClick={() => setDayForm({ mode: "edit" })}>✎ Editar día</button>
        </div>
        {day.note ? <div className="note">{day.note}</div> : null}

        <div className="progress">
          <div className="progress-head">
            <span>{dayDone ? "¡Día completo! 💪" : "Series completadas"}</span>
            <span className="count">{doneCount}/{totalCount}</span>
          </div>
          <div className="bar">
            <div className="bar-fill" style={{ width: totalCount ? `${(doneCount / totalCount) * 100}%` : "0%" }} />
          </div>
          <div className="head-actions">
            <button className="reset" onClick={() => setSummaryOpen((v) => !v)}>
              {summaryOpen ? "Ocultar resumen" : "📊 Resumen del día"}
            </button>
            <button className="reset" onClick={resetDay}>Reiniciar día</button>
          </div>
        </div>
      </header>

      <main className="list">
        {summaryOpen && (
          <div className="summary">
            <div className="sum-title">Resumen · Día {safeDayIdx + 1} ({day.focus})</div>
            <div className="sum-stats">
              <div className="sum-stat"><span className="sum-num">{doneCount}/{totalCount}</span><span className="sum-lbl">series hoy</span></div>
              <div className="sum-stat"><span className="sum-num">{summary.progressed}</span><span className="sum-lbl">con progreso</span></div>
            </div>
            {Object.keys(summary.totals).length > 0 && (
              <div className="sum-totals">
                <span className="sum-totals-lbl">Carga total agregada</span>
                <div className="sum-chips">
                  {Object.entries(summary.totals).map(([suf, val]) => (
                    <span key={suf} className={"sum-chip" + (val > 0 ? " up" : "")}>
                      {val > 0 ? "+" : "−"}{fmtNum(Math.abs(val))} {suf}
                    </span>
                  ))}
                </div>
              </div>
            )}
            {summary.rows.length === 0 ? (
              <div className="sum-empty">Aún no registras cambios este día. Edita un peso o anota tus reps para empezar a ver tu progreso.</div>
            ) : (
              <div className="sum-list">
                {summary.rows.map((r) => (
                  <div className="sum-row" key={r.id}>
                    <span className="sum-ex">{r.name}</span>
                    <span className="sum-prog">
                      <span className="sum-from">{r.startStr}</span>
                      <span className="sum-arrow">→</span>
                      <span className="sum-to">{r.curStr}</span>
                    </span>
                    <span className="sum-badges">
                      {r.gain != null && r.gain !== 0 && (
                        <span className={"sum-gain" + (r.gain > 0 ? " up" : " down")}>
                          {r.gain > 0 ? "+" : "−"}{fmtNum(Math.abs(r.gain))}
                        </span>
                      )}
                      {r.repsGain != null && r.repsGain > 0 && (
                        <span className="sum-gain reps">+{r.repsGain} rep{r.repsGain > 1 ? "s" : ""}</span>
                      )}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {day.exercises.length === 0 && (
          <div className="empty-day">Este día aún no tiene ejercicios. ¡Agrega el primero! 👇</div>
        )}

        {day.exercises.map((ex, ei) => {
          const arr = getArr(ex);
          const done = arr.filter(Boolean).length;
          const allDone = done === ex.sets;
          return (
            <div className="card" key={ex.id}>
              <div className="card-top">
                <div className="ex-text">
                  <div className="ex-name">{ex.name}</div>
                  {ex.sub ? <div className="ex-sub">{ex.sub}</div> : null}
                </div>
                <button className="weight" onClick={() => (editingEx === ex.id ? closeEditor() : openEditor(ex))}>
                  {ex.weight}<span className="pencil">✎</span>
                </button>
              </div>

              <div className="meta">
                <span className="chip-meta">{ex.sets} series</span>
                <span className="chip-meta">{ex.reps} reps</span>
                <span className="chip-meta soft">⏱ {ex.rest != null ? `${ex.rest}s` : `${settings.globalRest}s`}</span>
                <button className="chip-meta btn" onClick={() => setExForm({ mode: "edit", ex })}>✎</button>
                <button className="chip-meta btn" onClick={() => moveExercise(ex.id, -1)} disabled={ei === 0}>↑</button>
                <button className="chip-meta btn" onClick={() => moveExercise(ex.id, 1)} disabled={ei === day.exercises.length - 1}>↓</button>
              </div>

              {editingEx === ex.id && (
                <div className="editor">
                  {editNumeric ? (
                    <React.Fragment>
                      <div className="ed-display">
                        <input className="ed-input" inputMode="decimal" value={editVal} onChange={(e) => commitNumeric(e.target.value)} />
                        {editSuffix ? <span className="ed-unit">{editSuffix}</span> : null}
                      </div>
                      <div className="ed-steps">
                        {STEPS.map((d) => (
                          <button key={d} className="step" onClick={() => stepBy(d)}>
                            {d > 0 ? `+${d}` : `−${Math.abs(d)}`}
                          </button>
                        ))}
                      </div>
                    </React.Fragment>
                  ) : (
                    <input className="ed-input text" value={editVal} placeholder="Escribe el peso" onChange={(e) => commitText(e.target.value)} />
                  )}
                  <div className="ed-reps">
                    <div className="ed-reps-label">Reps logradas<span className="ed-reps-goal">objetivo {ex.reps}</span></div>
                    <div className="ed-reps-ctrl">
                      <button className="rep-step" onClick={() => setEditReps(String(Math.max(0, (parseInt(editReps) || 0) - 1)))}>−</button>
                      <input className="ed-input reps" inputMode="numeric" value={editReps} placeholder="—" onChange={(e) => setEditReps(e.target.value.replace(/[^\d]/g, ""))} />
                      <button className="rep-step" onClick={() => setEditReps(String((parseInt(editReps) || 0) + 1))}>+</button>
                    </div>
                  </div>
                  <div className="ed-foot">
                    <span className="ed-sug">Se guarda en el historial</span>
                    <button className="ed-done" onClick={closeEditor}>Listo</button>
                  </div>
                </div>
              )}

              {ex.tip ? <div className="tip">{ex.tip}</div> : null}

              <div className="dots">
                {arr.map((d, si) => (
                  <button key={si} className={"dot" + (d ? " done" : "")} onClick={() => toggleSet(ex, si)} aria-label={`Serie ${si + 1}`}>
                    {d ? "✓" : si + 1}
                  </button>
                ))}
              </div>

              <button className={"start-btn" + (allDone ? " finished" : "")} onClick={() => !allDone && setWorkoutExId(ex.id)} disabled={allDone}>
                {allDone ? "✓ Completado" : done > 0 ? `▶ Continuar (serie ${done + 1} de ${ex.sets})` : "▶ Iniciar ejercicio"}
              </button>

              {history[ex.id] && history[ex.id].length > 0 && (
                <React.Fragment>
                  <button className="hist-toggle" onClick={() => setHistOpen(histOpen === ex.id ? null : ex.id)}>
                    <span>📈 {histOpen === ex.id ? "Ocultar progreso" : "Progreso"}</span>
                    <span className="hist-count">{history[ex.id].length}</span>
                  </button>
                  {histOpen === ex.id && <HistoryPanel entries={history[ex.id]} onClear={() => clearHistory(ex.id)} />}
                </React.Fragment>
              )}
            </div>
          );
        })}

        <button className="add-ex" onClick={() => setExForm({ mode: "new" })}>＋ Agregar ejercicio</button>
        <div className="footer-space" />
      </main>

      <footer className="timer">
        {active ? (
          <div className="t-run">
            <svg width="56" height="56" viewBox="0 0 56 56" className="ring">
              <circle cx="28" cy="28" r={RING_R} className="ring-bg" fill="none" />
              <circle cx="28" cy="28" r={RING_R} className="ring-fg" fill="none"
                strokeDasharray={RING_C} strokeDashoffset={RING_C * (1 - frac)} transform="rotate(-90 28 28)" />
            </svg>
            <div className="t-time">{mm}:{ss}</div>
            <div className="t-controls">
              <button className="t-btn" onClick={() => addTime(15)}>+15</button>
              <button className="t-btn primary" onClick={pauseResume}>{running ? "Pausa" : "Seguir"}</button>
              <button className="t-btn ghost" onClick={stopTimer}>✕</button>
            </div>
          </div>
        ) : (
          <React.Fragment>
            <div className="t-idle">
              <div className="t-label">Descanso</div>
              <div className="t-presets">
                {PRESETS.map((p) => (<button key={p} className="preset" onClick={() => startTimer(p)}>{p}s</button>))}
              </div>
              <div className="t-toggles">
                <button className={"toggle" + (settings.autoRest ? " on" : "")} onClick={() => updSettings({ autoRest: !settings.autoRest })}>Auto ⏱</button>
                <button className={"toggle" + (settings.soundOn ? " on" : "")} onClick={() => updSettings({ soundOn: !settings.soundOn })}>{settings.soundOn ? "🔔" : "🔕"}</button>
                <button className={"toggle" + (gearOpen ? " on" : "")} onClick={() => setGearOpen((v) => !v)}>⚙</button>
              </div>
            </div>
            {gearOpen && (
              <div className="gear">
                <span className="gear-lbl">Descanso global</span>
                <div className="gear-ctrl">
                  <button className="t-btn" onClick={() => updSettings({ globalRest: Math.max(10, settings.globalRest - 15) })}>−15</button>
                  <span className="gear-val">{settings.globalRest}s</span>
                  <button className="t-btn" onClick={() => updSettings({ globalRest: settings.globalRest + 15 })}>+15</button>
                </div>
              </div>
            )}
          </React.Fragment>
        )}
      </footer>

      {exForm && (
        <ExerciseForm
          initial={exForm.mode === "edit" ? exForm.ex : null}
          globalRest={settings.globalRest}
          onCancel={() => setExForm(null)}
          onSave={(data) => {
            if (exForm.mode === "edit") updateExercise(exForm.ex.id, data);
            else addExercise(data);
            setExForm(null);
          }}
          onDelete={exForm.mode === "edit" ? () => { deleteExercise(exForm.ex.id); setExForm(null); } : null}
        />
      )}

      {dayForm && (
        <DayForm
          initial={dayForm.mode === "edit" ? day : null}
          canDelete={routine.days.length > 1}
          onCancel={() => setDayForm(null)}
          onSave={(data) => {
            if (dayForm.mode === "edit") updateDay(data);
            else addDay(data);
            setDayForm(null);
          }}
          onDelete={deleteDay}
        />
      )}

      {workoutEx && (
        <WorkoutOverlay
          key={workoutEx.id}
          ex={workoutEx}
          doneArr={getArr(workoutEx)}
          restSec={workoutEx.rest != null ? workoutEx.rest : settings.globalRest}
          onMarkSet={(si) => markSetDone(workoutEx.id, si)}
          onClose={() => setWorkoutExId(null)}
          onFinishLog={(reps) => { if (reps !== "" && reps != null) appendHistory(workoutEx.id, workoutEx.weight, reps); }}
          nextEx={nextEx}
          onNext={() => nextEx && setWorkoutExId(nextEx.id)}
          ensureAudio={ensureAudio}
          fireAlarm={fireAlarm}
        />
      )}
    </div>
  );
}

const CSS = `
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
.wrap {
  --ink:#14110F; --surface:#1F1B18; --surface2:#2A2420; --line:#3A322C;
  --effort:#FF5E1A; --effort-soft:#FF8246; --rest:#2DD4BF;
  --text:#F5EFE7; --muted:#A79C90;
  max-width: 520px; margin: 0 auto; min-height: 100vh;
  background: var(--ink); color: var(--text);
  font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
  display: flex; flex-direction: column;
}
.top { position: sticky; top: 0; z-index: 5; background: linear-gradient(180deg, var(--ink) 70%, rgba(20,17,15,0)); padding: 14px 16px 12px; }
.brand { font-weight: 800; letter-spacing: -0.02em; font-size: 17px; margin-bottom: 12px; }
.brand-mark { color: var(--effort); margin-right: 4px; }
.days { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.days::-webkit-scrollbar { display: none; }
.day-btn { flex: 1 0 auto; min-width: 86px; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 10px 8px; border: 1px solid var(--line); border-radius: 14px; background: var(--surface); color: var(--muted); cursor: pointer; transition: all .15s ease; }
.day-btn.on { background: var(--effort); border-color: var(--effort); color: #1a0d05; }
.day-btn.add { min-width: 56px; border-style: dashed; }
.day-n { font-weight: 800; font-size: 14px; letter-spacing: -0.01em; white-space: nowrap; }
.day-f { font-size: 11px; font-weight: 600; opacity: .9; white-space: nowrap; max-width: 110px; overflow: hidden; text-overflow: ellipsis; }
.focus-line { margin-top: 12px; font-size: 13px; font-weight: 700; color: var(--text); display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.day-edit { font-size: 11px; font-weight: 700; color: var(--muted); background: none; border: 1px solid var(--line); border-radius: 99px; padding: 4px 10px; cursor: pointer; flex-shrink: 0; }
.note { margin-top: 4px; font-size: 12px; line-height: 1.45; color: var(--muted); }
.progress { margin-top: 12px; }
.progress-head { display: flex; justify-content: space-between; font-size: 12px; font-weight: 700; color: var(--muted); }
.progress-head .count { color: var(--effort); font-variant-numeric: tabular-nums; }
.bar { margin-top: 6px; height: 6px; border-radius: 99px; background: var(--surface2); overflow: hidden; }
.bar-fill { height: 100%; background: var(--effort); border-radius: 99px; transition: width .25s ease; }
.reset { font-size: 12px; font-weight: 600; color: var(--muted); background: none; border: 1px solid var(--line); border-radius: 99px; padding: 5px 12px; cursor: pointer; }
.head-actions { display: flex; gap: 8px; margin-top: 10px; }
.list { flex: 1; padding: 4px 16px 0; }
.empty-day { padding: 28px 16px; text-align: center; color: var(--muted); font-size: 14px; border: 1px dashed var(--line); border-radius: 18px; margin-bottom: 12px; }
.card { background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 14px; margin-bottom: 12px; }
.card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 10px; }
.ex-name { font-weight: 800; font-size: 16px; letter-spacing: -0.015em; line-height: 1.15; }
.ex-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.weight { flex-shrink: 0; display: inline-flex; align-items: baseline; gap: 5px; font-weight: 800; font-size: 15px; color: var(--effort); font-variant-numeric: tabular-nums; text-align: right; max-width: 150px; line-height: 1.15; background: none; cursor: pointer; padding: 4px 0 5px 8px; border: none; border-bottom: 1.5px dashed rgba(255,94,26,.45); }
.weight .pencil { font-size: 11px; opacity: .75; }
.meta { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
.chip-meta { font-size: 12px; font-weight: 700; color: var(--text); background: var(--surface2); border-radius: 8px; padding: 4px 9px; font-variant-numeric: tabular-nums; border: none; }
.chip-meta.soft { color: var(--rest); }
.chip-meta.btn { cursor: pointer; color: var(--muted); border: 1px solid var(--line); background: none; }
.chip-meta.btn:disabled { opacity: .3; cursor: default; }
.tip { margin-top: 10px; font-size: 12.5px; line-height: 1.5; color: var(--muted); }
.dots { display: flex; flex-wrap: wrap; gap: 9px; margin-top: 14px; }
.dot { width: 46px; height: 46px; border-radius: 13px; border: 1.5px solid var(--line); background: var(--surface2); color: var(--muted); font-weight: 800; font-size: 16px; cursor: pointer; transition: all .12s ease; }
.dot.done { background: var(--effort); border-color: var(--effort); color: #1a0d05; transform: scale(1.02); }
.start-btn { margin-top: 12px; width: 100%; padding: 13px 0; border-radius: 13px; border: none; background: var(--effort); color: #1a0d05; font-weight: 800; font-size: 15px; cursor: pointer; }
.start-btn.finished { background: var(--surface2); color: var(--rest); cursor: default; border: 1px solid var(--line); }
.add-ex { width: 100%; padding: 15px 0; border-radius: 18px; border: 1.5px dashed var(--line); background: none; color: var(--muted); font-weight: 800; font-size: 14px; cursor: pointer; margin-bottom: 12px; }
.add-ex:active { color: var(--effort); border-color: var(--effort); }
.footer-space { height: 18px; }
.timer { position: sticky; bottom: 0; z-index: 6; background: var(--surface); border-top: 1px solid var(--line); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); box-shadow: 0 -8px 24px rgba(0,0,0,.35); }
.t-idle { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.t-label { font-size: 12px; font-weight: 800; color: var(--rest); letter-spacing: .04em; text-transform: uppercase; }
.t-presets { display: flex; gap: 8px; flex: 1; }
.preset { flex: 1; padding: 12px 0; border-radius: 13px; border: 1px solid var(--line); background: var(--surface2); color: var(--text); font-weight: 800; font-size: 15px; cursor: pointer; font-variant-numeric: tabular-nums; }
.preset:active { background: var(--rest); color: #04201c; border-color: var(--rest); }
.t-toggles { display: flex; gap: 8px; }
.toggle { padding: 10px 11px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface2); color: var(--muted); font-weight: 700; font-size: 12px; cursor: pointer; }
.toggle.on { color: var(--rest); border-color: var(--rest); }
.gear { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--line); }
.gear-lbl { font-size: 13px; font-weight: 700; color: var(--muted); }
.gear-ctrl { display: flex; align-items: center; gap: 10px; }
.gear-val { font-size: 18px; font-weight: 800; color: var(--rest); min-width: 52px; text-align: center; font-variant-numeric: tabular-nums; }
.t-run { display: flex; align-items: center; gap: 12px; }
.ring { flex-shrink: 0; }
.ring-bg { stroke: var(--surface2); stroke-width: 6; }
.ring-fg { stroke: var(--rest); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .15s linear; }
.t-time { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; min-width: 96px; color: var(--text); }
.t-controls { display: flex; gap: 8px; margin-left: auto; }
.t-btn { padding: 12px 14px; border-radius: 13px; border: 1px solid var(--line); background: var(--surface2); color: var(--text); font-weight: 800; font-size: 14px; cursor: pointer; }
.t-btn.primary { background: var(--rest); color: #04201c; border-color: var(--rest); }
.t-btn.ghost { color: var(--muted); }
.editor { margin-top: 12px; padding: 12px; background: var(--surface2); border: 1px solid var(--line); border-radius: 14px; }
.ed-display { display: flex; align-items: center; gap: 8px; }
.ed-input { flex: 1; min-width: 0; background: var(--ink); border: 1px solid var(--line); border-radius: 11px; color: var(--text); font-weight: 800; font-size: 22px; text-align: right; padding: 11px 12px; font-variant-numeric: tabular-nums; }
.ed-input:focus { outline: 2px solid var(--effort); outline-offset: 0; }
.ed-input.text { text-align: left; font-size: 16px; }
.ed-unit { font-size: 14px; font-weight: 700; color: var(--muted); white-space: nowrap; }
.ed-steps { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 10px; }
.step { padding: 13px 0; border-radius: 11px; border: 1px solid var(--line); background: var(--ink); color: var(--text); font-weight: 800; font-size: 14px; cursor: pointer; font-variant-numeric: tabular-nums; }
.step:active { background: var(--effort); color: #1a0d05; border-color: var(--effort); }
.ed-foot { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 12px; }
.ed-sug { font-size: 12px; color: var(--muted); }
.ed-done { font-size: 13px; font-weight: 800; color: #04201c; background: var(--rest); border: none; border-radius: 99px; padding: 9px 18px; cursor: pointer; }
.ed-reps { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.ed-reps-label { font-size: 13px; font-weight: 700; color: var(--text); display: flex; flex-direction: column; gap: 2px; }
.ed-reps-goal { font-size: 11px; font-weight: 600; color: var(--muted); }
.ed-reps-ctrl { display: flex; align-items: center; gap: 8px; }
.rep-step { width: 42px; height: 42px; border-radius: 11px; border: 1px solid var(--line); background: var(--ink); color: var(--text); font-weight: 800; font-size: 20px; cursor: pointer; }
.rep-step:active { background: var(--rest); color: #04201c; border-color: var(--rest); }
.ed-input.reps { width: 58px; flex: none; text-align: center; font-size: 18px; padding: 10px 4px; }
.hist-toggle { margin-top: 12px; display: inline-flex; align-items: center; gap: 8px; background: none; border: 1px solid var(--line); border-radius: 99px; padding: 7px 12px; color: var(--muted); font-weight: 700; font-size: 12px; cursor: pointer; }
.hist-count { background: var(--ink); color: var(--rest); border-radius: 99px; padding: 1px 8px; font-variant-numeric: tabular-nums; font-size: 11px; }
.hist { margin-top: 12px; padding: 12px; background: var(--surface2); border: 1px solid var(--line); border-radius: 14px; }
.spark { width: 100%; height: 46px; display: block; margin-bottom: 10px; }
.spark-line { stroke: var(--rest); stroke-width: 2; vector-effect: non-scaling-stroke; stroke-linejoin: round; stroke-linecap: round; }
.hist-list { display: flex; flex-direction: column; }
.hist-row { display: flex; align-items: center; gap: 10px; padding: 8px 2px; border-bottom: 1px solid rgba(58,50,44,.55); font-size: 13px; }
.hist-row:last-child { border-bottom: none; }
.hist-date { color: var(--muted); width: 66px; flex-shrink: 0; font-size: 12px; }
.hist-w { font-weight: 800; color: var(--text); flex: 1; font-variant-numeric: tabular-nums; }
.hist-reps { color: var(--rest); font-weight: 700; }
.hist-delta { font-weight: 800; font-size: 12px; min-width: 46px; text-align: right; font-variant-numeric: tabular-nums; }
.hist-delta.up { color: var(--effort); }
.hist-delta.down { color: var(--muted); }
.hist-clear { margin-top: 10px; background: none; border: none; color: var(--muted); font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: underline; }
.summary { background: var(--surface); border: 1px solid var(--effort); border-radius: 18px; padding: 16px; margin-bottom: 14px; }
.sum-title { font-weight: 800; font-size: 16px; letter-spacing: -0.01em; margin-bottom: 12px; }
.sum-stats { display: flex; gap: 10px; margin-bottom: 14px; }
.sum-stat { flex: 1; background: var(--surface2); border-radius: 12px; padding: 12px; display: flex; flex-direction: column; gap: 2px; }
.sum-num { font-size: 22px; font-weight: 800; color: var(--effort); font-variant-numeric: tabular-nums; }
.sum-lbl { font-size: 12px; color: var(--muted); font-weight: 600; }
.sum-totals { margin-bottom: 14px; }
.sum-totals-lbl { font-size: 12px; font-weight: 700; color: var(--muted); }
.sum-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 7px; }
.sum-chip { font-size: 14px; font-weight: 800; color: var(--muted); background: var(--surface2); border-radius: 10px; padding: 6px 11px; font-variant-numeric: tabular-nums; }
.sum-chip.up { color: var(--effort); }
.sum-list { display: flex; flex-direction: column; }
.sum-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid rgba(58,50,44,.55); }
.sum-row:last-child { border-bottom: none; }
.sum-ex { font-size: 13px; font-weight: 700; flex: 1; min-width: 0; }
.sum-prog { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
.sum-to { color: var(--text); font-weight: 700; }
.sum-arrow { opacity: .6; }
.sum-badges { display: flex; gap: 5px; flex-shrink: 0; }
.sum-gain { font-size: 12px; font-weight: 800; border-radius: 8px; padding: 3px 7px; font-variant-numeric: tabular-nums; }
.sum-gain.up { color: #1a0d05; background: var(--effort); }
.sum-gain.down { color: var(--muted); background: var(--surface2); }
.sum-gain.reps { color: #04201c; background: var(--rest); }
.sum-empty { font-size: 13px; line-height: 1.5; color: var(--muted); }
.modal-backdrop { position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.6); display: flex; align-items: flex-end; justify-content: center; }
.modal { width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; background: var(--surface); border: 1px solid var(--line); border-radius: 22px 22px 0 0; padding: 18px 16px calc(18px + env(safe-area-inset-bottom)); }
.modal-title { font-weight: 800; font-size: 17px; margin-bottom: 14px; letter-spacing: -0.01em; }
.f-label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin: 10px 0 5px; }
.f-input { width: 100%; background: var(--ink); border: 1px solid var(--line); border-radius: 11px; color: var(--text); font-weight: 700; font-size: 16px; padding: 11px 12px; font-family: inherit; }
.f-input:focus { outline: 2px solid var(--effort); }
.f-input.area { resize: none; line-height: 1.4; font-weight: 600; font-size: 14px; }
.f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 18px; flex-wrap: wrap; }
.modal-actions-right { display: flex; gap: 8px; margin-left: auto; }
.m-btn { padding: 12px 16px; border-radius: 13px; border: 1px solid var(--line); background: var(--surface2); color: var(--text); font-weight: 800; font-size: 14px; cursor: pointer; }
.m-btn.primary { background: var(--effort); border-color: var(--effort); color: #1a0d05; }
.m-btn.primary:disabled { opacity: .4; cursor: default; }
.m-btn.ghost { background: none; color: var(--muted); }
.m-btn.danger { background: #7f1d1d; border-color: #7f1d1d; color: #fee2e2; }
.overlay { position: fixed; inset: 0; z-index: 50; background: var(--ink); color: var(--text); display: flex; flex-direction: column; align-items: center; padding: 18px 20px calc(24px + env(safe-area-inset-bottom)); overflow-y: auto; font-family: -apple-system, "Segoe UI", Roboto, system-ui, sans-serif; }
.ov-top { width: 100%; max-width: 520px; position: relative; text-align: center; padding-top: 6px; }
.ov-close { position: absolute; left: 0; top: 0; width: 40px; height: 40px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); font-size: 16px; font-weight: 800; cursor: pointer; }
.ov-exname { font-size: 20px; font-weight: 800; letter-spacing: -0.02em; padding: 8px 46px 0; }
.ov-sub { font-size: 13px; color: var(--effort); font-weight: 700; margin-top: 3px; }
.ov-dots { display: flex; gap: 8px; margin: 18px 0 6px; }
.ov-dot { width: 12px; height: 12px; border-radius: 99px; background: var(--surface2); border: 1.5px solid var(--line); }
.ov-dot.done { background: var(--effort); border-color: var(--effort); }
.ov-dot.cur { border-color: var(--effort); box-shadow: 0 0 0 3px rgba(255,94,26,.25); }
.ov-body { flex: 1; width: 100%; max-width: 520px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 4px; padding: 10px 0; }
.ov-label { font-size: 13px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
.ov-label.rest { color: var(--rest); }
.ov-big { font-size: 88px; font-weight: 800; line-height: 1; letter-spacing: -0.04em; font-variant-numeric: tabular-nums; }
.ov-big.small { font-size: 64px; }
.ov-of { font-size: 30px; color: var(--muted); font-weight: 800; margin-left: 6px; }
.ov-target { font-size: 17px; font-weight: 700; color: var(--text); margin-top: 10px; }
.ov-target-num { color: var(--effort); font-size: 22px; font-weight: 800; }
.ov-tip { font-size: 13px; line-height: 1.5; color: var(--muted); max-width: 340px; margin-top: 14px; }
.ov-main { margin-top: 26px; width: 100%; max-width: 360px; padding: 18px 0; border-radius: 16px; border: none; background: var(--effort); color: #1a0d05; font-weight: 800; font-size: 17px; cursor: pointer; }
.ov-main.secondary { background: var(--surface2); color: var(--text); border: 1px solid var(--line); margin-top: 10px; }
.ov-ring-wrap { position: relative; margin-top: 12px; }
.ov-ring-time { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.ov-next { font-size: 14px; font-weight: 700; color: var(--muted); margin-top: 14px; }
.ov-rest-controls { display: flex; gap: 10px; margin-top: 18px; }
.ov-done-title { font-size: 24px; font-weight: 800; letter-spacing: -0.02em; margin-top: 8px; }
.ov-reps { margin-top: 22px; padding: 14px; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; display: flex; align-items: center; gap: 14px; justify-content: space-between; width: 100%; max-width: 360px; }
.ov-reps-label { font-size: 13px; font-weight: 700; text-align: left; display: flex; flex-direction: column; gap: 2px; }
@media (prefers-reduced-motion: reduce) { .bar-fill, .ring-fg, .dot, .day-btn { transition: none; } }
`;
