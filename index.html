<script type="text/babel">
const { useState, useEffect, useRef } = React;

const STORE = {
  get(k) { try { const v = localStorage.getItem(k); return v == null ? null : v; } catch (e) { return null; } },
  set(k, v) { try { localStorage.setItem(k, v); } catch (e) {} },
};

const uid = () => Math.random().toString(36).slice(2, 9) + Date.now().toString(36);

const RING_R = 24;
const RING_C = 2 * Math.PI * RING_R;
const BIG_R = 70;
const BIG_C = 2 * Math.PI * BIG_R;
const PRESETS = [45, 60, 90, 120];
const STEPS = [-2.5, -0.5, 0.5, 2.5];

        exercises: [

          mk({ name: "Chest press", sub: "Máquina", sets: 3, reps: "10–12", weight: "11.5 kg", tip: "Peso fijo. No subas hasta completar las 12 reps en las 3 series con postura perfecta." }),
          mk({ name: "Seated fly", sub: "Aperturas en máquina", sets: 3, reps: "12–15", weight: "20 kg", tip: "Busca el bombeo y la tensión en el pecho, sin impulso de la espalda." }),
          mk({ name: "Overhead press", sub: "Prensa de hombros", sets: 3, reps: "10–12", weight: "4.5 kg", tip: "Hombros ya cansados: empieza en 4.5 kg o un punto intermedio. Mismo peso las 3 series." }),
          mk({ name: "Vuelos laterales", sub: "Mancuernas", sets: 3, reps: "12–15", weight: "2.5 kg / lado", tip: "Controla la bajada, no dejes caer las mancuernas por gravedad." }),
          mk({ name: "Arm extension", sub: "Tríceps en máquina", sets: 3, reps: "12–15", weight: "11.5 kg", tip: "Al final. Te desafiará porque el tríceps ya trabajó en todo lo demás." }),
        ],
      },
      {
        id: uid(), focus: "Piernas", body: "Tren inferior completo",
        note: "Usa un peso intermedio desafiante que puedas mantener en todas las series.",
        exercises: [
          mk({ name: "Hack slide", sub: "Sentadilla hack sin peso", sets: 4, reps: "12–15", weight: "Solo cuerpo", tip: "Baja profundo y controlado." }),
          mk({ name: "Leg press", sub: "Prensa", sets: 4, reps: "10–12", weight: "10 kg / lado", tip: "Un peso que te permita 10 reps sólidas en la 4ª serie." }),
          mk({ name: "Leg extension", sub: "Extensión de piernas", sets: 3, reps: "12–15", weight: "18 kg", tip: "Aprieta el cuádriceps arriba." }),
          mk({ name: "Seated leg curl", sub: "Femoral sentado", sets: 3, reps: "12–15", weight: "18 kg", tip: "Movimiento controlado, sin rebote." }),
          mk({ name: "Hip adduction", sub: "Aductores en máquina", sets: 3, reps: "12–15", weight: "55 lb", tip: "Constante. Sube de escalón solo cuando las 15 reps sean fáciles en las 3 series." }),
          mk({ name: "Peso muerto con mancuernas", sub: "", sets: 3, reps: "10–12", weight: "7.5 kg / mano", tip: "Siente el estiramiento detrás de las piernas; no curves la espalda." }),
          mk({ name: "Gemelos (puntillas)", sub: "Mancuernas", sets: 3, reps: "15", weight: "15 kg / mano", tip: "Pausa 1 s arriba y 1 s abajo en cada repetición." }),
        ],

      {

        note: "Mucho volumen de espalda: estabiliza los pesos para no fatigarte antes de tiempo.",
        exercises: [
          mk({ name: "Pull-down", sub: "Polea al pecho", sets: 4, reps: "10–12", weight: "31.5 kg", tip: "Si logras 12 en todas las series, la próxima semana sube una placa." }),
          mk({ name: "Row sentado a dos manos", sub: "Remo", sets: 3, reps: "10–12", weight: "40 kg", tip: "40 kg (o 45 si es ligero). Evita 60: la fuerza sale de brazos y espalda alta, no de tirones." }),
          mk({ name: "Remo con barra", sub: "Barra 20 kg", sets: 3, reps: "10–12", weight: "20 kg", tip: "Mantén el torso inclinado y firme." }),
          mk({ name: "Rear delt row", sub: "Hombro posterior", sets: 3, reps: "12", weight: "25 kg", tip: "Aprieta la parte trasera del hombro." }),
          mk({ name: "Arm curl", sub: "Bíceps en máquina", sets: 3, reps: "12", weight: "11.5 kg", tip: "Peso fijo. El bíceps ya ayudó en los 3 remos anteriores." }),
          mk({ name: "Curl de mancuerna", sub: "Brazo largo extendido", sets: 3, reps: "12", weight: "5 kg / mano", tip: "Estira bien abajo, sin balanceo." }),
          mk({ name: "Plancha", sub: "Core", sets: 4, reps: "≤ 1 min", weight: "Cuerpo", tip: "Aguanta lo máximo con abdomen y glúteos apretados, sin que caiga la cadera." }),

      },
    ],

}

function parseWeight(w) {
  const m = String(w).match(/^\s*(\d+(?:[.,]\d+)?)\s*(.*)$/);
  if (m) return { num: parseFloat(m[1].replace(",", ".")), suffix: m[2].trim() };
  return { num: null, suffix: String(w) };
}
function fmtNum(n) { return Number.isInteger(n) ? String(n) : String(parseFloat(n.toFixed(2))); }
function compose(n, suffix) { return suffix ? `${fmtNum(n)} ${suffix}` : fmtNum(n); }
function formatDate(t) {
  const d = new Date(t);
  const now = new Date();
  const opts = { day: "2-digit", month: "short" };
  if (d.getFullYear() !== now.getFullYear()) opts.year = "numeric";
  return d.toLocaleDateString("es-ES", opts);
}
function fmtClock(sec) {
  const s = Math.floor(sec);
  const m = Math.floor(s / 60);
  return m + ":" + String(s % 60).padStart(2, "0");
}
function vibrate(p) { if (navigator.vibrate) { try { navigator.vibrate(p); } catch (e) {} } }

/* ---------- Confeti ---------- */
function Confetti() {
  const colors = ["#2D7FF9", "#56CCF2", "#FF8A5C", "#FFD166", "#34D399", "#A78BFA"];
  const pieces = Array.from({ length: 48 }, (_, i) => i);
  return (
    <div className="confetti">
      {pieces.map((i) => (
        <span key={i} className="cf" style={{
          left: Math.random() * 100 + "%",
          background: colors[i % colors.length],
          animationDelay: Math.random() * 0.7 + "s",
          animationDuration: 1.8 + Math.random() * 1.4 + "s",
          width: 6 + Math.random() * 6 + "px",
          height: 9 + Math.random() * 8 + "px",
        }} />
      ))}
    </div>
  );
}

/* ---------- Historial de pesos ---------- */
function HistoryPanel({ entries, onClear }) {
  const nums = entries.filter((e) => e.n != null);
  let spark = null;
  if (nums.length >= 2) {
    const vals = nums.map((e) => e.n);
    const min = Math.min(...vals);
    const max = Math.max(...vals);
    const span = max - min || 1;
    const pts = nums.map((e, i) => {
      const x = (i / (nums.length - 1)) * 96 + 2;
      const y = 28 - ((e.n - min) / span) * 22;
      return [x, y];
    });
    const poly = pts.map((p) => `${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
    const area = `2,32 ${poly} 98,32`;
    spark = (
      <svg className="spark" viewBox="0 0 100 32" preserveAspectRatio="none">
        <defs>
          <linearGradient id="sparkfill" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stopColor="#2D7FF9" stopOpacity="0.30" />
            <stop offset="100%" stopColor="#2D7FF9" stopOpacity="0" />
          </linearGradient>
        </defs>
        <polygon points={area} fill="url(#sparkfill)" />
        <polyline points={poly} className="spark-line" fill="none" />
        {pts.map((p, i) => (
          <circle key={i} cx={p[0]} cy={p[1]} r="1.6" className="spark-dot" />
        ))}
      </svg>
    );
  }
  const rows = entries.slice().reverse();
  return (
    <div className="hist">
      {spark}
      <div className="hist-list">
        {rows.map((e, idx) => {
          const older = rows[idx + 1];
          const delta = e.n != null && older && older.n != null ? e.n - older.n : null;
          return (
            <div className="hist-row" key={e.t + "-" + idx}>
              <span className="hist-date">{formatDate(e.t)}</span>
              <span className="hist-w">
                {e.w}
                {e.reps != null ? <span className="hist-reps"> · {e.reps} reps</span> : null}
              </span>
              {delta != null && delta !== 0 ? (
                <span className={"hist-delta" + (delta > 0 ? " up" : " down")}>
                  {delta > 0 ? "▲ " : "▼ "}{fmtNum(Math.abs(delta))}
                </span>
              ) : (<span className="hist-delta" />)}
            </div>
          );
        })}
      </div>
      <button className="hist-clear" onClick={onClear}>Borrar historial</button>
    </div>
  );
}

/* ---------- Formulario de ejercicio ---------- */
function ExerciseForm({ initial, globalRest, onSave, onCancel, onDelete }) {
  const [f, setF] = useState({
    name: initial?.name || "",
    sub: initial?.sub || "",
    tip: initial?.tip || "",
    sets: initial?.sets != null ? String(initial.sets) : "3",
    reps: initial?.reps || "10–12",
    weight: initial?.weight || "",
    rest: initial?.rest != null ? String(initial.rest) : "",
  });
  const [confirmDel, setConfirmDel] = useState(false);
  const upd = (k) => (e) => setF({ ...f, [k]: e.target.value });

  function save() {
    if (!f.name.trim()) return;
    let weight = f.weight.trim() || "—";
    if (/^\d+([.,]\d+)?$/.test(weight)) weight = weight.replace(",", ".") + " kg";
    const sets = Math.min(12, Math.max(1, parseInt(f.sets, 10) || 3));
    const restN = f.rest.trim() === "" ? null : Math.max(5, parseInt(f.rest, 10) || globalRest);
    onSave({ name: f.name.trim(), sub: f.sub.trim(), tip: f.tip.trim(), sets, reps: f.reps.trim() || "10", weight, rest: restN });
  }

  return (
    <div className="modal-backdrop" onClick={onCancel}>
      <div className="modal" onClick={(e) => e.stopPropagation()}>
        <div className="modal-grab" />
        <div className="modal-title">{initial ? "Editar ejercicio" : "Nuevo ejercicio"}</div>
        <label className="f-label">Nombre *</label>
        <input className="f-input" value={f.name} onChange={upd("name")} placeholder="Ej: Press de banca" />
        <label className="f-label">Máquina / subtítulo</label>
        <input className="f-input" value={f.sub} onChange={upd("sub")} placeholder="Ej: Máquina, mancuernas…" />
        <label className="f-label">Descripción / consejo</label>
        <textarea className="f-input area" value={f.tip} onChange={upd("tip")} placeholder="Técnica, notas…" rows={2} />
        <div className="f-grid">
          <div>
            <label className="f-label">Series</label>
            <input className="f-input" inputMode="numeric" value={f.sets} onChange={(e) => setF({ ...f, sets: e.target.value.replace(/[^\d]/g, "") })} />
          </div>
          <div>
            <label className="f-label">Reps</label>
            <input className="f-input" value={f.reps} onChange={upd("reps")} placeholder="10–12" />
          </div>
        </div>
        <div className="f-grid">
          <div>
            <label className="f-label">Peso (kg)</label>
            <input className="f-input" value={f.weight} onChange={upd("weight")} placeholder="Ej: 20" />
          </div>
          <div>
            <label className="f-label">Descanso (s)</label>
            <input className="f-input" inputMode="numeric" value={f.rest} onChange={(e) => setF({ ...f, rest: e.target.value.replace(/[^\d]/g, "") })} placeholder={`Global (${globalRest}s)`} />
          </div>
        </div>
        <div className="modal-actions">
          {onDelete && (confirmDel ? (
            <button className="m-btn danger" onClick={onDelete}>¿Seguro? Eliminar</button>
          ) : (
            <button className="m-btn ghost" onClick={() => setConfirmDel(true)}>Eliminar</button>
          ))}
          <div className="modal-actions-right">
            <button className="m-btn ghost" onClick={onCancel}>Cancelar</button>
            <button className="m-btn primary" onClick={save} disabled={!f.name.trim()}>Guardar</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ---------- Formulario de día ---------- */

          </div>

/* ---------- Modo entrenamiento ---------- */
function WorkoutOverlay({ ex, doneArr, restSec, onMarkSet, onLogSet, onClose, onFinishLog, nextEx, onNext, ensureAudio, fireAlarm }) {
  const total = ex.sets;
  const firstInc = doneArr.findIndex((d) => !d);
  const [phase, setPhase] = useState(firstInc === -1 ? "done" : "work");
  const [setIdx, setSetIdx] = useState(firstInc === -1 ? total - 1 : firstInc);
  const [remaining, setRemaining] = useState(0);
  const [restTotal, setRestTotal] = useState(restSec);
  const [endAt, setEndAt] = useState(null);
  const [running, setRunning] = useState(false);
  const [reps, setReps] = useState("");
  const [elapsed, setElapsed] = useState(0);
  const [durations, setDurations] = useState({});
  const workStartRef = useRef(null);

  /* Cronómetro ascendente: arranca automáticamente al aparecer la serie */
  useEffect(() => {
    if (phase !== "work") return;
    const t0 = Date.now();
    workStartRef.current = t0;
    setElapsed(0);
    const id = setInterval(() => setElapsed((Date.now() - t0) / 1000), 250);
    return () => clearInterval(id);
  }, [phase, setIdx]);

  function completeSet() {
    ensureAudio();
    vibrate(20);
    const dur = workStartRef.current ? Math.max(1, Math.round((Date.now() - workStartRef.current) / 1000)) : 0;
    setDurations((d) => ({ ...d, [setIdx]: dur }));
    onMarkSet(setIdx);
    onLogSet(setIdx, dur);
    /* Descanso siempre, incluso tras la última serie */
    setRestTotal(restSec);
    setRemaining(restSec);
    setEndAt(Date.now() + restSec * 1000);
    setRunning(true);
    setPhase("rest");
  }
  function advance() {
    setRunning(false); setEndAt(null); setRemaining(0);
    if (setIdx >= total - 1) {
      setPhase("done");
    } else {
      setSetIdx((i) => i + 1);
      setPhase("work");
    }
  }
  function addTime(s) {
    if (running) { setEndAt((e) => (e || Date.now()) + s * 1000); setRestTotal((t) => t + s); }
    else { setRemaining((r) => r + s); setRestTotal((t) => t + s); }
  }
  function pauseResume() {
    if (running) { setRemaining(Math.max(0, (endAt - Date.now()) / 1000)); setRunning(false); setEndAt(null); }
    else if (remaining > 0) { ensureAudio(); setEndAt(Date.now() + remaining * 1000); setRunning(true); }
  }

  useEffect(() => {
    if (!running || endAt == null) return;
    const id = setInterval(() => {
      const rem = Math.max(0, (endAt - Date.now()) / 1000);
      if (rem <= 0) { clearInterval(id); fireAlarm(); advance(); }
      else { setRemaining(rem); }
    }, 150);
    return () => clearInterval(id);
  }, [running, endAt]);

  const dispSec = Math.ceil(remaining);
  const mm = Math.floor(dispSec / 60);
  const ss = String(dispSec % 60).padStart(2, "0");
  const frac = restTotal > 0 ? Math.min(1, Math.max(0, remaining / restTotal)) : 0;
  const isLast = setIdx >= total - 1;
  const durList = Array.from({ length: total }, (_, i) => durations[i]).filter((d) => d != null);

  return (
    <div className="overlay">
      <div className="ov-top">
        <button className="ov-close" onClick={onClose}>✕</button>
        <div className="ov-exname">{ex.name}</div>
        <div className="ov-sub">{ex.sub ? ex.sub + " · " : ""}{ex.weight}</div>
      </div>

      <div className="ov-dots">
        {doneArr.map((d, i) => (
          <span key={i} className={"ov-dot" + (d ? " done" : "") + (phase !== "done" && i === setIdx ? " cur" : "")} />
        ))}
      </div>

      {phase === "work" && (
        <div className="ov-body anim" key={"w" + setIdx}>
          <div className="ov-label">Serie</div>
          <div className="ov-big">{setIdx + 1}<span className="ov-of">/ {total}</span></div>
          <div className="ov-target"><span className="ov-target-num">{ex.reps}</span> reps · {ex.weight}</div>
          <div className="ov-stopwatch">
            <span className="ov-sw-dot" />
            {fmtClock(elapsed)}
          </div>
          {ex.tip ? <div className="ov-tip">{ex.tip}</div> : null}
          <button className="ov-main" onClick={completeSet}>✓&nbsp; Serie completada</button>
        </div>
      )}

      {phase === "rest" && (
        <div className="ov-body anim" key="r">
          <div className="ov-label rest">Descanso</div>
          <div className={"ov-ring-wrap" + (running ? " pulsing" : "")}>
            <svg width="176" height="176" viewBox="0 0 176 176">
              <circle cx="88" cy="88" r={BIG_R} className="ring-bg" fill="none" strokeWidth="11" />
              <circle cx="88" cy="88" r={BIG_R} className="ring-fg glow" fill="none" strokeWidth="11"
                strokeDasharray={BIG_C} strokeDashoffset={BIG_C * (1 - frac)} transform="rotate(-90 88 88)" />
            </svg>
            <div className="ov-ring-time">{mm}:{ss}</div>
          </div>
          {durations[setIdx] != null && (
            <div className="ov-lastdur">Serie {setIdx + 1}: {durations[setIdx]} s ⏱</div>
          )}
          <div className="ov-next">
            {isLast ? "Última serie completada 🎯" : `Siguiente: serie ${setIdx + 2} de ${total}`}
          </div>
          <div className="ov-rest-controls">
            <button className="t-btn" onClick={() => addTime(15)}>+15s</button>
            <button className="t-btn" onClick={pauseResume}>{running ? "Pausa" : "Seguir"}</button>
            <button className="t-btn primary" onClick={advance}>{isLast ? "Terminar →" : "Saltar →"}</button>
          </div>
        </div>
      )}

      {phase === "done" && (
        <div className="ov-body anim" key="d">
          <div className="ov-trophy">💪</div>
          <div className="ov-done-title">¡Ejercicio completado!</div>
          <div className="ov-target">{total} series · {ex.weight}</div>
          {durList.length > 0 && (
            <div className="ov-durs">
              {Array.from({ length: total }, (_, i) =>
                durations[i] != null ? (
                  <span key={i} className="ov-dur">S{i + 1} · {durations[i]}s</span>
                ) : null
              )}
            </div>
          )}
          <div className="ov-reps">
            <div className="ov-reps-label">
              Reps logradas en la última serie
              <span className="ed-reps-goal">objetivo {ex.reps}</span>
            </div>
            <div className="ed-reps-ctrl">
              <button className="rep-step" onClick={() => setReps(String(Math.max(0, (parseInt(reps) || 0) - 1)))}>−</button>
              <input className="ed-input reps" inputMode="numeric" value={reps} placeholder="—"
                onChange={(e) => setReps(e.target.value.replace(/[^\d]/g, ""))} />
              <button className="rep-step" onClick={() => setReps(String((parseInt(reps) || 0) + 1))}>+</button>
            </div>
          </div>
          {nextEx ? (
            <button className="ov-main" onClick={() => { onFinishLog(reps); onNext(); }}>
              Siguiente: {nextEx.name} →
            </button>
          ) : null}
          <button className={"ov-main" + (nextEx ? " secondary" : "")} onClick={() => { onFinishLog(reps); onClose(); }}>
            {nextEx ? "Finalizar" : "🎉 Terminar — ¡día completo!"}
          </button>
        </div>
      )}
    </div>
  );
}

/* ---------- Historial de sesiones ---------- */
function SessionsScreen({ sessions, onClose, onExport, onClear }) {
  const [confirmClear, setConfirmClear] = useState(false);
  const groups = (() => {
    const g = [];
    const map = {};
    sessions.slice().reverse().forEach((s) => {
      const d = new Date(s.t);
      const k = d.toLocaleDateString("es-ES", { weekday: "long", day: "2-digit", month: "short", year: "numeric" });
      if (!map[k]) { map[k] = []; g.push([k, map[k]]); }
      map[k].push(s);
    });
    return g;
  })();
  return (
    <div className="overlay sess">
      <div className="ov-top">
        <button className="ov-close" onClick={onClose}>✕</button>
        <div className="ov-exname">Bitácora de sesiones</div>
        <div className="ov-sub">{sessions.length} serie{sessions.length === 1 ? "" : "s"} registrada{sessions.length === 1 ? "" : "s"}</div>
      </div>

      <div className="sess-actions">
        <button className="t-btn primary" onClick={onExport} disabled={sessions.length === 0}>⬇ Exportar CSV</button>
        {confirmClear ? (
          <button className="m-btn danger" onClick={() => { onClear(); setConfirmClear(false); }}>¿Seguro? Borrar todo</button>
        ) : (
          <button className="t-btn ghost" onClick={() => setConfirmClear(true)} disabled={sessions.length === 0}>Borrar</button>
        )}
      </div>

      <div className="sess-list">
        {groups.length === 0 && (
          <div className="sess-empty">
            <span className="empty-ico">📒</span>
            Aún no hay sesiones registradas.<br />
            Completa series con <b>▶ Iniciar ejercicio</b> y aparecerán aquí.
          </div>
        )}
        {groups.map(([date, rows]) => (
          <div className="sess-group rise-fast" key={date}>
            <div className="sess-date">{date}</div>
            {rows.map((s, i) => {
              const d = new Date(s.t);
              const hh = String(d.getHours()).padStart(2, "0");
              const mi = String(d.getMinutes()).padStart(2, "0");
              return (
                <div className="sess-row" key={s.t + "-" + i}>
                  <span className="sess-time">{hh}:{mi}</span>
                  <span className="sess-main">
                    <span className="sess-ex">{s.ex}</span>
                    <span className="sess-detail">Serie {s.set}/{s.of} · {s.w}</span>
                  </span>
                  <span className="sess-dur">{s.dur}s</span>
                </div>
              );
            })}
          </div>
        ))}
      </div>
    </div>
  );
}

/* ---------- App ---------- */
function App() {
  const [routine, setRoutine] = useState(() => {
    const v = STORE.get("routine_v2");
    if (v) { try { const r = JSON.parse(v); if (r && r.days && r.days.length) return r; } catch (e) {} }
    const r = buildDefaultRoutine();
    STORE.set("routine_v2", JSON.stringify(r));
    return r;
  });
  const [history, setHistory] = useState(() => {
    const v = STORE.get("history_v2");
    if (v) { try { return JSON.parse(v); } catch (e) {} }
    return {};
  });
  const [sessions, setSessions] = useState(() => {
    const v = STORE.get("sessions_v1");
    if (v) { try { const s = JSON.parse(v); if (Array.isArray(s)) return s; } catch (e) {} }
    return [];
  });
  const [settings, setSettings] = useState(() => {
    const base = { globalRest: 90, autoRest: true, soundOn: true };
    const v = STORE.get("settings_v2");
    if (v) { try { return { ...base, ...JSON.parse(v) }; } catch (e) {} }
    return base;
  });

  const [dayIdx, setDayIdx] = useState(0);
  const [setsDone, setSetsDone] = useState({});
  const [editingEx, setEditingEx] = useState(null);
  const [editVal, setEditVal] = useState("");
  const [editSuffix, setEditSuffix] = useState("");
  const [editNumeric, setEditNumeric] = useState(true);
  const [editStart, setEditStart] = useState("");
  const [editReps, setEditReps] = useState("");
  const [histOpen, setHistOpen] = useState(null);
  const [summaryOpen, setSummaryOpen] = useState(false);
  const [gearOpen, setGearOpen] = useState(false);
  const [exForm, setExForm] = useState(null);
  const [dayForm, setDayForm] = useState(null);
  const [workoutExId, setWorkoutExId] = useState(null);
  const [sessionsOpen, setSessionsOpen] = useState(false);
  const [toast, setToast] = useState(null);
  const [celebrate, setCelebrate] = useState(false);

  const [total, setTotal] = useState(0);
  const [remaining, setRemaining] = useState(0);
  const [endAt, setEndAt] = useState(null);
  const [running, setRunning] = useState(false);
  const audioRef = useRef(null);
  const toastRef = useRef(null);
  const prevDoneRef = useRef(false);
  const fileRef = useRef(null);

  function showToast(msg) {
    setToast(msg);
    if (toastRef.current) clearTimeout(toastRef.current);
    toastRef.current = setTimeout(() => setToast(null), 2200);
  }

  function persistRoutine(next) { setRoutine(next); STORE.set("routine_v2", JSON.stringify(next)); }
  function persistHistory(next) { setHistory(next); STORE.set("history_v2", JSON.stringify(next)); }
  function persistSessions(next) { setSessions(next); STORE.set("sessions_v1", JSON.stringify(next)); }
  function updSettings(patch) {
    const next = { ...settings, ...patch };
    setSettings(next);
    STORE.set("settings_v2", JSON.stringify(next));
  }

  const safeDayIdx = Math.min(dayIdx, routine.days.length - 1);
  const day = routine.days[safeDayIdx];

  function updateExercise(exId, patch) {
    persistRoutine({
      ...routine,
      days: routine.days.map((d) => ({ ...d, exercises: d.exercises.map((e) => (e.id === exId ? { ...e, ...patch } : e)) })),
    });
  }
  function addExercise(data) {
    const ex = { id: uid(), ...data };
    persistRoutine({
      ...routine,
      days: routine.days.map((d, i) => (i === safeDayIdx ? { ...d, exercises: [...d.exercises, ex] } : d)),
    });
    showToast("Ejercicio agregado ✓");
  }
  function deleteExercise(exId) {
    persistRoutine({
      ...routine,
      days: routine.days.map((d) => ({ ...d, exercises: d.exercises.filter((e) => e.id !== exId) })),
    });
    const nh = { ...history };
    delete nh[exId];
    persistHistory(nh);
    if (workoutExId === exId) setWorkoutExId(null);
    showToast("Ejercicio eliminado");
  }
  function moveExercise(exId, dir) {
    const exs = day.exercises.slice();
    const i = exs.findIndex((e) => e.id === exId);
    const j = i + dir;
    if (i < 0 || j < 0 || j >= exs.length) return;
    [exs[i], exs[j]] = [exs[j], exs[i]];
    persistRoutine({ ...routine, days: routine.days.map((d, k) => (k === safeDayIdx ? { ...d, exercises: exs } : d)) });
  }
  function addDay(data) {
    const next = { ...routine, days: [...routine.days, { id: uid(), ...data, exercises: [] }] };
    persistRoutine(next);
    setDayIdx(next.days.length - 1);
    showToast("Día agregado ✓");
  }
  function updateDay(data) {
    persistRoutine({ ...routine, days: routine.days.map((d, i) => (i === safeDayIdx ? { ...d, ...data } : d)) });
    showToast("Día actualizado ✓");
  }
  function deleteDay() {
    if (routine.days.length <= 1) return;
    const removed = routine.days[safeDayIdx];
    const next = { ...routine, days: routine.days.filter((_, i) => i !== safeDayIdx) };
    const nh = { ...history };
    removed.exercises.forEach((e) => delete nh[e.id]);
    persistRoutine(next);
    persistHistory(nh);
    setDayIdx(Math.max(0, safeDayIdx - 1));
    setDayForm(null);
    showToast("Día eliminado");
  }

  function getArr(ex) {
    const a = setsDone[ex.id] || [];
    return Array.from({ length: ex.sets }, (_, i) => !!a[i]);
  }
  function toggleSet(ex, si) {
    const arr = getArr(ex).slice();
    const wasDone = arr[si];
    arr[si] = !arr[si];
    setSetsDone((s) => ({ ...s, [ex.id]: arr }));
    if (!wasDone) {
      vibrate(15);
      if (settings.autoRest && workoutExId == null)
        startTimer(ex.rest != null ? ex.rest : settings.globalRest);
    }
  }
  function markSetDone(exId, si) {
    const ex = day.exercises.find((e) => e.id === exId);
    if (!ex) return;
    const arr = getArr(ex).slice();
    arr[si] = true;
    setSetsDone((s) => ({ ...s, [exId]: arr }));
  }
  function resetDay() {
    setSetsDone((s) => {
      const next = { ...s };
      day.exercises.forEach((e) => delete next[e.id]);
      return next;
    });
  }

  /* ---- bitácora de sesiones ---- */
  function logSessionSet(ex, setIdx, dur) {
    const entry = { t: Date.now(), ex: ex.name, set: setIdx + 1, of: ex.sets, w: ex.weight, dur };
    persistSessions([...sessions, entry]);
  }
  function clearSessions() {
    persistSessions([]);
    showToast("Bitácora borrada");
  }
  function exportSessionsCSV() {
    try {
      const header = "Fecha,Hora,Ejercicio,Serie,Peso,Duracion_seg";
      const rows = sessions.map((s) => {
        const d = new Date(s.t);
        const fecha = String(d.getDate()).padStart(2, "0") + "/" + String(d.getMonth() + 1).padStart(2, "0") + "/" + d.getFullYear();
        const hora = String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0");
        const name = '"' + String(s.ex).replace(/"/g, '""') + '"';
        const w = '"' + String(s.w).replace(/"/g, '""') + '"';
        return [fecha, hora, name, s.set + "/" + s.of, w, s.dur].join(",");
      });
      const csv = "\uFEFF" + [header].concat(rows).join("\r\n");
      const blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mi-rutina-sesiones.csv";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      showToast("CSV descargado ✓");
    } catch (e) { showToast("No se pudo exportar"); }
  }

  function appendHistory(exId, w, reps) {
    const arr = history[exId] || [];
    const r = reps == null || reps === "" ? null : parseInt(reps, 10);
    const rr = r != null && !isNaN(r) ? r : null;
    const last = arr[arr.length - 1];
    if (last && last.w === w && (last.reps ?? null) === rr) return;
    const p = parseWeight(w);
    persistHistory({ ...history, [exId]: [...arr, { t: Date.now(), w, n: p.num, reps: rr }] });
  }
  function clearHistory(exId) {
    const next = { ...history };
    delete next[exId];
    persistHistory(next);
    setHistOpen(null);
    showToast("Historial borrado");
  }

  function exById(exId) {
    for (const d of routine.days) for (const e of d.exercises) if (e.id === exId) return e;
    return null;
  }
  function finalizeEdit() {
    if (editingEx == null) return;
    const ex = exById(editingEx);
    if (!ex) return;
    const cur = ex.weight;
    const repsNum = parseInt(String(editReps).replace(/[^\d]/g, ""), 10);
    const reps = isNaN(repsNum) ? null : repsNum;
    const weightChanged = cur && cur !== editStart;
    if (weightChanged || reps != null) {
      appendHistory(editingEx, cur, reps);
      showToast("Progreso guardado ✓");
    }
  }
  function closeEditor() { finalizeEdit(); setEditingEx(null); }
  function openEditor(ex) {
    finalizeEdit();
    const p = parseWeight(ex.weight);
    setEditStart(ex.weight);
    setEditReps("");
    setEditingEx(ex.id);
    setEditNumeric(p.num !== null);
    setEditSuffix(p.num !== null ? p.suffix : "");
    setEditVal(p.num !== null ? fmtNum(p.num) : ex.weight);
  }
  function commitNumeric(str) {
    setEditVal(str);
    const n = parseFloat(String(str).replace(",", "."));
    if (!isNaN(n)) updateExercise(editingEx, { weight: compose(n, editSuffix) });
  }
  function stepBy(d) {
    const cur = parseFloat(String(editVal).replace(",", ".")) || 0;
    const n = Math.max(0, Math.round((cur + d) * 100) / 100);
    setEditVal(fmtNum(n));
    updateExercise(editingEx, { weight: compose(n, editSuffix) });
  }
  function commitText(v) { setEditVal(v); updateExercise(editingEx, { weight: v }); }
  function changeDay(i) {
    finalizeEdit();
    setEditingEx(null); setHistOpen(null); setSummaryOpen(false);
    setDayIdx(i);
  }

  function ensureAudio() {
    try {
      if (!audioRef.current) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (Ctx) audioRef.current = new Ctx();
      }
      if (audioRef.current && audioRef.current.state === "suspended") audioRef.current.resume();
    } catch (e) {}
  }
  function fireAlarm() {
    vibrate([220, 120, 220, 120, 220]);
    if (!settings.soundOn) return;
    try {
      const ctx = audioRef.current;
      if (!ctx) return;
      [0, 0.28, 0.56].forEach((t) => {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.type = "sine"; o.frequency.value = 920;
        const start = ctx.currentTime + t;
        g.gain.setValueAtTime(0.0001, start);
        g.gain.exponentialRampToValueAtTime(0.35, start + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, start + 0.22);
        o.start(start); o.stop(start + 0.24);
      });
    } catch (e) {}
  }

  function startTimer(sec) {
    ensureAudio();
    setTotal(sec); setRemaining(sec);
    setEndAt(Date.now() + sec * 1000); setRunning(true);
  }
  function pauseResume() {
    if (running) { setRemaining(Math.max(0, (endAt - Date.now()) / 1000)); setRunning(false); setEndAt(null); }
    else if (remaining > 0) { ensureAudio(); setEndAt(Date.now() + remaining * 1000); setRunning(true); }
  }
  function addTime(sec) {
    if (running) { setEndAt((e) => (e || Date.now()) + sec * 1000); setTotal((t) => t + sec); }
    else { setRemaining((r) => r + sec); setTotal((t) => Math.max(t, remaining + sec)); }
  }
  function stopTimer() { setRunning(false); setEndAt(null); setRemaining(0); setTotal(0); }

  useEffect(() => {
    if (!running || endAt == null) return;
    const id = setInterval(() => {
      const rem = Math.max(0, (endAt - Date.now()) / 1000);
      if (rem <= 0) {
        clearInterval(id);
        setRemaining(0); setRunning(false); setEndAt(null);
        fireAlarm();
      } else { setRemaining(rem); }
    }, 150);
    return () => clearInterval(id);
  }, [running, endAt, settings.soundOn]);

  function exportData() {
    try {
      const data = { app: "mi-rutina", version: 3, exported: new Date().toISOString(), routine, history, sessions, settings };
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mi-rutina-respaldo.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 2000);
      showToast("Respaldo descargado ✓");
    } catch (e) { showToast("No se pudo exportar"); }
  }
  function importData(file) {
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const data = JSON.parse(reader.result);
        if (!data || !data.routine || !data.routine.days) throw new Error("inválido");
        persistRoutine(data.routine);
        persistHistory(data.history || {});
        if (Array.isArray(data.sessions)) persistSessions(data.sessions);
        if (data.settings) updSettings(data.settings);
        setDayIdx(0);
        showToast("Datos restaurados ✓");
      } catch (e) { showToast("Archivo de respaldo inválido"); }
    };
    reader.readAsText(file);
  }

  const doneCount = day.exercises.reduce((acc, ex) => acc + getArr(ex).filter(Boolean).length, 0);
  const totalCount = day.exercises.reduce((acc, ex) => acc + ex.sets, 0);
  const dayDone = totalCount > 0 && doneCount === totalCount;

  useEffect(() => {
    if (dayDone && !prevDoneRef.current) {
      setCelebrate(true);
      vibrate([60, 60, 60, 60, 120]);
      const id = setTimeout(() => setCelebrate(false), 3200);
      return () => clearTimeout(id);
    }
    prevDoneRef.current = dayDone;
  }, [dayDone]);

  const summary = (() => {
    const rows = [];
    const totals = {};
    let progressed = 0;
    day.exercises.forEach((ex) => {
      const h = history[ex.id];
      if (!h || h.length === 0) return;
      const numEntries = h.filter((e) => e.n != null);
      const startN = numEntries.length ? numEntries[0].n : null;
      const p = parseWeight(ex.weight);
      const curN = p.num;
      const suffix = p.suffix;
      const gain = startN != null && curN != null ? Math.round((curN - startN) * 100) / 100 : null;
      const repsEntries = h.filter((e) => e.reps != null);
      const startReps = repsEntries.length ? repsEntries[0].reps : null;
      const lastReps = repsEntries.length ? repsEntries[repsEntries.length - 1].reps : null;
      const repsGain = startReps != null && lastReps != null ? lastReps - startReps : null;
      const startStr = numEntries.length ? compose(startN, suffix) : h[0].w;
      const improved = (gain != null && gain > 0) || (repsGain != null && repsGain > 0);
      if (improved) progressed++;
      if (gain != null && gain !== 0 && suffix)
        totals[suffix] = Math.round(((totals[suffix] || 0) + gain) * 100) / 100;
      rows.push({ id: ex.id, name: ex.name, startStr, curStr: ex.weight, gain, repsGain });
    });
    return { rows, totals, progressed };
  })();

  const workoutEx = workoutExId ? day.exercises.find((e) => e.id === workoutExId) : null;
  let nextEx = null;
  if (workoutEx) {
    const idx = day.exercises.findIndex((e) => e.id === workoutExId);
    const ordered = [...day.exercises.slice(idx + 1), ...day.exercises.slice(0, idx)];
    nextEx = ordered.find((e) => getArr(e).some((d) => !d)) || null;
  }

  const active = running || remaining > 0;
  const displaySec = Math.ceil(remaining);
  const mm = Math.floor(displaySec / 60);
  const ss = String(displaySec % 60).padStart(2, "0");
  const frac = total > 0 ? Math.min(1, Math.max(0, remaining / total)) : 0;
  const pct = totalCount ? Math.round((doneCount / totalCount) * 100) : 0;

  return (
    <div className="wrap">
      <style>{CSS}</style>

      <header className="top">
        <div className="brand">
          <span className="brand-logo" />
          <span className="brand-name">Mi Rutina</span>
          <span className="brand-tag">PRO</span>
          <button className="icon-btn" onClick={() => setSessionsOpen(true)} aria-label="Bitácora de sesiones">
            📒
            {sessions.length > 0 && <span className="icon-badge">{sessions.length > 99 ? "99+" : sessions.length}</span>}
          </button>
        </div>
        <div className="days">
          {routine.days.map((d, i) => (
            <button key={d.id} className={"day-btn" + (i === safeDayIdx ? " on" : "")} onClick={() => changeDay(i)}>
              <span className="day-n">Día {i + 1}</span>
              <span className="day-f">{d.focus}</span>
            </button>
          ))}
          <button className="day-btn add" onClick={() => setDayForm({ mode: "new" })} aria-label="Agregar día">
            <span className="day-n">＋</span>
            <span className="day-f">Día</span>
          </button>
        </div>

        <div className="hero">
          <div className="hero-row">
            <span className="hero-focus">{day.body || day.focus}</span>
            <button className="day-edit" onClick={() => setDayForm({ mode: "edit" })}>✎ Editar</button>
          </div>
          {day.note ? <div className="note">{day.note}</div> : null}
          <div className="progress">
            <div className="progress-head">
              <span>{dayDone ? "¡Día completo! 💪" : "Series completadas"}</span>
              <span className="count">{doneCount}<span className="count-sep">/</span>{totalCount} · {pct}%</span>
            </div>
            <div className="bar">
              <div className={"bar-fill" + (dayDone ? " full" : "")} style={{ width: totalCount ? `${pct}%` : "0%" }} />
            </div>
            <div className="head-actions">
              <button className="reset" onClick={() => setSummaryOpen((v) => !v)}>
                {summaryOpen ? "Ocultar resumen" : "📊 Resumen del día"}
              </button>
              <button className="reset" onClick={resetDay}>Reiniciar día</button>
            </div>
          </div>
        </div>
      </header>

      <main className="list">
        {summaryOpen && (
          <div className="summary rise">
            <div className="sum-title">Resumen · Día {safeDayIdx + 1} <span className="sum-focus">({day.focus})</span></div>
            <div className="sum-stats">
              <div className="sum-stat"><span className="sum-num">{doneCount}/{totalCount}</span><span className="sum-lbl">series hoy</span></div>
              <div className="sum-stat"><span className="sum-num">{summary.progressed}</span><span className="sum-lbl">con progreso</span></div>
            </div>
            {Object.keys(summary.totals).length > 0 && (
              <div className="sum-totals">
                <span className="sum-totals-lbl">Carga total agregada</span>
                <div className="sum-chips">
                  {Object.entries(summary.totals).map(([suf, val]) => (
                    <span key={suf} className={"sum-chip" + (val > 0 ? " up" : "")}>
                      {val > 0 ? "+" : "−"}{fmtNum(Math.abs(val))} {suf}
                    </span>
                  ))}
                </div>
              </div>
            )}
            {summary.rows.length === 0 ? (
              <div className="sum-empty">Aún no registras cambios este día. Edita un peso o anota tus reps para empezar a ver tu progreso.</div>
            ) : (
              <div className="sum-list">
                {summary.rows.map((r) => (
                  <div className="sum-row" key={r.id}>
                    <span className="sum-ex">{r.name}</span>
                    <span className="sum-prog">
                      <span className="sum-from">{r.startStr}</span>
                      <span className="sum-arrow">→</span>
                      <span className="sum-to">{r.curStr}</span>
                    </span>
                    <span className="sum-badges">
                      {r.gain != null && r.gain !== 0 && (
                        <span className={"sum-gain" + (r.gain > 0 ? " up" : " down")}>
                          {r.gain > 0 ? "+" : "−"}{fmtNum(Math.abs(r.gain))}
                        </span>
                      )}
                      {r.repsGain != null && r.repsGain > 0 && (
                        <span className="sum-gain reps">+{r.repsGain} rep{r.repsGain > 1 ? "s" : ""}</span>
                      )}
                    </span>
                  </div>
                ))}
              </div>
            )}
          </div>
        )}

        {day.exercises.length === 0 && (
          <div className="empty-day rise">
            <span className="empty-ico">🏋️</span>
            Este día aún no tiene ejercicios.<br />¡Agrega el primero! 👇
          </div>
        )}

        {day.exercises.map((ex, ei) => {
          const arr = getArr(ex);
          const done = arr.filter(Boolean).length;
          const allDone = done === ex.sets;
          return (
            <div className={"card rise" + (allDone ? " card-done" : "")} key={ex.id} style={{ animationDelay: `${Math.min(ei * 0.04, 0.3)}s` }}>
              <div className="card-top">
                <div className="ex-text">
                  <div className="ex-name">{ex.name}</div>
                  {ex.sub ? <div className="ex-sub">{ex.sub}</div> : null}
                </div>
                <button className="weight" onClick={() => (editingEx === ex.id ? closeEditor() : openEditor(ex))}>
                  {ex.weight}<span className="pencil">✎</span>
                </button>
              </div>

              <div className="meta">
                <span className="chip-meta">{ex.sets} series</span>
                <span className="chip-meta">{ex.reps} reps</span>
                <span className="chip-meta soft">⏱ {ex.rest != null ? `${ex.rest}s` : `${settings.globalRest}s`}</span>
                <button className="chip-meta btn" onClick={() => setExForm({ mode: "edit", ex })}>✎</button>
                <button className="chip-meta btn" onClick={() => moveExercise(ex.id, -1)} disabled={ei === 0}>↑</button>
                <button className="chip-meta btn" onClick={() => moveExercise(ex.id, 1)} disabled={ei === day.exercises.length - 1}>↓</button>
              </div>

              {editingEx === ex.id && (
                <div className="editor rise-fast">
                  {editNumeric ? (
                    <React.Fragment>
                      <div className="ed-display">
                        <input className="ed-input" inputMode="decimal" value={editVal} onChange={(e) => commitNumeric(e.target.value)} />
                        {editSuffix ? <span className="ed-unit">{editSuffix}</span> : null}
                      </div>
                      <div className="ed-steps">
                        {STEPS.map((d) => (
                          <button key={d} className="step" onClick={() => stepBy(d)}>
                            {d > 0 ? `+${d}` : `−${Math.abs(d)}`}
                          </button>
                        ))}
                      </div>
                    </React.Fragment>
                  ) : (
                    <input className="ed-input text" value={editVal} placeholder="Escribe el peso" onChange={(e) => commitText(e.target.value)} />
                  )}
                  <div className="ed-reps">
                    <div className="ed-reps-label">Reps logradas<span className="ed-reps-goal">objetivo {ex.reps}</span></div>
                    <div className="ed-reps-ctrl">
                      <button className="rep-step" onClick={() => setEditReps(String(Math.max(0, (parseInt(editReps) || 0) - 1)))}>−</button>
                      <input className="ed-input reps" inputMode="numeric" value={editReps} placeholder="—" onChange={(e) => setEditReps(e.target.value.replace(/[^\d]/g, ""))} />
                      <button className="rep-step" onClick={() => setEditReps(String((parseInt(editReps) || 0) + 1))}>+</button>
                    </div>
                  </div>
                  <div className="ed-foot">
                    <span className="ed-sug">Se guarda en el historial</span>
                    <button className="ed-done" onClick={closeEditor}>Listo</button>
                  </div>
                </div>
              )}

              {ex.tip ? <div className="tip">{ex.tip}</div> : null}

              <div className="dots">
                {arr.map((d, si) => (
                  <button key={si} className={"dot" + (d ? " done" : "")} onClick={() => toggleSet(ex, si)} aria-label={`Serie ${si + 1}`}>
                    {d ? "✓" : si + 1}
                  </button>
                ))}
              </div>

              <button className={"start-btn" + (allDone ? " finished" : "")} onClick={() => !allDone && setWorkoutExId(ex.id)} disabled={allDone}>
                {allDone ? "✓ Completado" : done > 0 ? `▶ Continuar · serie ${done + 1} de ${ex.sets}` : "▶ Iniciar ejercicio"}
              </button>

              {history[ex.id] && history[ex.id].length > 0 && (
                <React.Fragment>
                  <button className="hist-toggle" onClick={() => setHistOpen(histOpen === ex.id ? null : ex.id)}>
                    <span>📈 {histOpen === ex.id ? "Ocultar progreso" : "Progreso"}</span>
                    <span className="hist-count">{history[ex.id].length}</span>
                  </button>
                  {histOpen === ex.id && <HistoryPanel entries={history[ex.id]} onClear={() => clearHistory(ex.id)} />}
                </React.Fragment>
              )}
            </div>
          );
        })}

        <button className="add-ex" onClick={() => setExForm({ mode: "new" })}>＋ Agregar ejercicio</button>
        <div className="footer-space" />
      </main>

      <footer className="timer">
        {active ? (
          <div className="t-run">
            <svg width="56" height="56" viewBox="0 0 56 56" className="ring">
              <circle cx="28" cy="28" r={RING_R} className="ring-bg" fill="none" />
              <circle cx="28" cy="28" r={RING_R} className="ring-fg" fill="none"
                strokeDasharray={RING_C} strokeDashoffset={RING_C * (1 - frac)} transform="rotate(-90 28 28)" />
            </svg>
            <div className="t-time">{mm}:{ss}</div>
            <div className="t-controls">
              <button className="t-btn" onClick={() => addTime(15)}>+15</button>
              <button className="t-btn primary" onClick={pauseResume}>{running ? "Pausa" : "Seguir"}</button>
              <button className="t-btn ghost" onClick={stopTimer}>✕</button>
            </div>
          </div>
        ) : (
          <React.Fragment>
            <div className="t-idle">
              <div className="t-label">Descanso</div>
              <div className="t-presets">
                {PRESETS.map((p) => (<button key={p} className="preset" onClick={() => startTimer(p)}>{p}s</button>))}
              </div>
              <div className="t-toggles">
                <button className={"toggle" + (settings.autoRest ? " on" : "")} onClick={() => updSettings({ autoRest: !settings.autoRest })}>Auto ⏱</button>
                <button className={"toggle" + (settings.soundOn ? " on" : "")} onClick={() => updSettings({ soundOn: !settings.soundOn })}>{settings.soundOn ? "🔔" : "🔕"}</button>
                <button className={"toggle" + (gearOpen ? " on" : "")} onClick={() => setGearOpen((v) => !v)}>⚙</button>
              </div>
            </div>
            {gearOpen && (
              <div className="gear rise-fast">
                <div className="gear-row">
                  <span className="gear-lbl">Descanso global</span>
                  <div className="gear-ctrl">
                    <button className="t-btn" onClick={() => updSettings({ globalRest: Math.max(10, settings.globalRest - 15) })}>−15</button>
                    <span className="gear-val">{settings.globalRest}s</span>
                    <button className="t-btn" onClick={() => updSettings({ globalRest: settings.globalRest + 15 })}>+15</button>
                  </div>
                </div>
                <div className="gear-row">
                  <span className="gear-lbl">Bitácora de sesiones</span>
                  <div className="gear-ctrl">
                    <button className="t-btn" onClick={() => setSessionsOpen(true)}>📒 Ver</button>
                    <button className="t-btn" onClick={exportSessionsCSV} disabled={sessions.length === 0}>⬇ CSV</button>
                  </div>
                </div>
                <div className="gear-row">
                  <span className="gear-lbl">Respaldo completo</span>
                  <div className="gear-ctrl">
                    <button className="t-btn" onClick={exportData}>⬇ Exportar</button>
                    <button className="t-btn" onClick={() => fileRef.current && fileRef.current.click()}>⬆ Importar</button>
                    <input ref={fileRef} type="file" accept=".json,application/json" style={{ display: "none" }}
                      onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) importData(f); e.target.value = ""; }} />
                  </div>
                </div>
              </div>
            )}
          </React.Fragment>
        )}
      </footer>

      {toast && <div className="toast" key={toast}>{toast}</div>}
      {celebrate && <Confetti />}

      {exForm && (
        <ExerciseForm
          initial={exForm.mode === "edit" ? exForm.ex : null}
          globalRest={settings.globalRest}
          onCancel={() => setExForm(null)}
          onSave={(data) => {
            if (exForm.mode === "edit") { updateExercise(exForm.ex.id, data); showToast("Ejercicio actualizado ✓"); }
            else addExercise(data);
            setExForm(null);
          }}
          onDelete={exForm.mode === "edit" ? () => { deleteExercise(exForm.ex.id); setExForm(null); } : null}
        />
      )}

      {dayForm && (
        <DayForm
          initial={dayForm.mode === "edit" ? day : null}
          canDelete={routine.days.length > 1}
          onCancel={() => setDayForm(null)}
          onSave={(data) => {
            if (dayForm.mode === "edit") updateDay(data);
            else addDay(data);
            setDayForm(null);
          }}
          onDelete={deleteDay}
        />
      )}

      {workoutEx && (
        <WorkoutOverlay
          key={workoutEx.id}
          ex={workoutEx}
          doneArr={getArr(workoutEx)}
          restSec={workoutEx.rest != null ? workoutEx.rest : settings.globalRest}
          onMarkSet={(si) => markSetDone(workoutEx.id, si)}
          onLogSet={(si, dur) => logSessionSet(workoutEx, si, dur)}
          onClose={() => setWorkoutExId(null)}
          onFinishLog={(reps) => { if (reps !== "" && reps != null) appendHistory(workoutEx.id, workoutEx.weight, reps); }}
          nextEx={nextEx}
          onNext={() => nextEx && setWorkoutExId(nextEx.id)}
          ensureAudio={ensureAudio}
          fireAlarm={fireAlarm}
        />
      )}

      {sessionsOpen && (
        <SessionsScreen
          sessions={sessions}
          onClose={() => setSessionsOpen(false)}
          onExport={exportSessionsCSV}
          onClear={clearSessions}
        />
      )}
    </div>
  );
}

.ring-bg { stroke: var(--line); stroke-width: 6; }
.ring-fg { stroke: var(--coral); stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset .15s linear; }
.ring-fg.glow { filter: drop-shadow(0 0 6px rgba(255,122,69,.55)); }
.t-time { font-size: 34px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; min-width: 96px; color: var(--text); }
.t-controls { display: flex; gap: 8px; margin-left: auto; }
.t-btn { padding: 12px 14px; border-radius: 13px; border: 1px solid var(--line); background: var(--surface2); color: var(--text); font-weight: 800; font-size: 13.5px; cursor: pointer; }
.t-btn.primary { background: var(--coral-grad); color: #fff; border-color: transparent; box-shadow: 0 4px 14px rgba(255,106,43,.35); }
.t-btn.ghost { color: var(--muted); }
.t-btn:disabled { opacity: .4; cursor: default; }

.editor { margin-top: 12px; padding: 13px; background: var(--surface2); border: 1px solid var(--line); border-radius: 15px; }
.ed-display { display: flex; align-items: center; gap: 8px; }
.ed-input { flex: 1; min-width: 0; background: var(--surface); border: 1px solid var(--line); border-radius: 12px; color: var(--text); font-weight: 800; font-size: 22px; text-align: right; padding: 11px 12px; font-variant-numeric: tabular-nums; }
.ed-input:focus { outline: 2px solid var(--blue); outline-offset: 0; }
.ed-input.text { text-align: left; font-size: 16px; }
.ed-unit { font-size: 14px; font-weight: 700; color: var(--muted); white-space: nowrap; }
.ed-steps { display: grid; grid-template-columns: repeat(4,1fr); gap: 8px; margin-top: 10px; }
.step { padding: 13px 0; border-radius: 12px; border: 1px solid var(--line); background: var(--surface); color: var(--text); font-weight: 800; font-size: 14px; cursor: pointer; font-variant-numeric: tabular-nums; }
.step:active { background: var(--blue); color: #fff; border-color: var(--blue); }
.ed-foot { display: flex; justify-content: space-between; align-items: center; gap: 10px; margin-top: 12px; }
.ed-sug { font-size: 12px; color: var(--muted2); }
.ed-done { font-size: 13px; font-weight: 800; color: #fff; background: var(--blue-grad); border: none; border-radius: 99px; padding: 10px 19px; cursor: pointer; box-shadow: var(--glow-blue); }
.ed-reps { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.ed-reps-label { font-size: 13px; font-weight: 700; color: var(--text); display: flex; flex-direction: column; gap: 2px; }
.ed-reps-goal { font-size: 11px; font-weight: 600; color: var(--muted); }
.ed-reps-ctrl { display: flex; align-items: center; gap: 8px; }
.rep-step { width: 42px; height: 42px; border-radius: 12px; border: 1px solid var(--line); background: var(--surface); color: var(--text); font-weight: 800; font-size: 20px; cursor: pointer; }
.rep-step:active { background: var(--blue); color: #fff; border-color: var(--blue); }
.ed-input.reps { width: 58px; flex: none; text-align: center; font-size: 18px; padding: 10px 4px; }

.hist-toggle { margin-top: 12px; display: inline-flex; align-items: center; gap: 8px; background: none; border: 1px solid var(--line); border-radius: 99px; padding: 8px 13px; color: var(--muted); font-weight: 700; font-size: 12px; cursor: pointer; }
.hist-count { background: rgba(45,127,249,.1); color: var(--blue); border-radius: 99px; padding: 2px 8px; font-variant-numeric: tabular-nums; font-size: 11px; font-weight: 800; }
.hist { margin-top: 12px; padding: 13px; background: var(--surface2); border: 1px solid var(--line); border-radius: 15px; animation: riseFast .25s ease both; }
.spark { width: 100%; height: 50px; display: block; margin-bottom: 10px; }
.spark-line { stroke: var(--blue); stroke-width: 2; vector-effect: non-scaling-stroke; stroke-linejoin: round; stroke-linecap: round; }
.spark-dot { fill: var(--blue); }
.hist-list { display: flex; flex-direction: column; }
.hist-row { display: flex; align-items: center; gap: 10px; padding: 9px 2px; border-bottom: 1px solid var(--line-soft); font-size: 13px; }
.hist-row:last-child { border-bottom: none; }
.hist-date { color: var(--muted); width: 66px; flex-shrink: 0; font-size: 12px; }
.hist-w { font-weight: 800; color: var(--text); flex: 1; font-variant-numeric: tabular-nums; }
.hist-reps { color: var(--blue); font-weight: 700; }
.hist-delta { font-weight: 800; font-size: 11.5px; min-width: 52px; text-align: right; font-variant-numeric: tabular-nums; }
.hist-delta.up { color: var(--success); }
.hist-delta.down { color: var(--muted2); }
.hist-clear { margin-top: 10px; background: none; border: none; color: var(--muted2); font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: underline; }

.summary { background: var(--surface); border: 1px solid rgba(45,127,249,.35); border-radius: 20px; padding: 17px; margin-bottom: 14px; box-shadow: var(--shadow-card); }
.sum-title { font-weight: 800; font-size: 16px; letter-spacing: -0.01em; margin-bottom: 13px; color: var(--text); }
.sum-focus { color: var(--muted); font-weight: 700; font-size: 13px; }
.sum-stats { display: flex; gap: 10px; margin-bottom: 14px; }
.sum-stat { flex: 1; background: var(--surface2); border-radius: 14px; padding: 13px; display: flex; flex-direction: column; gap: 2px; }
.sum-num { font-size: 23px; font-weight: 900; color: var(--blue); font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.sum-lbl { font-size: 12px; color: var(--muted); font-weight: 600; }
.sum-totals { margin-bottom: 14px; }
.sum-totals-lbl { font-size: 12px; font-weight: 700; color: var(--muted); }
.sum-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 7px; }
.sum-chip { font-size: 14px; font-weight: 800; color: var(--muted); background: var(--surface2); border-radius: 10px; padding: 6px 11px; font-variant-numeric: tabular-nums; }
.sum-chip.up { color: var(--blue); }
.sum-list { display: flex; flex-direction: column; }
.sum-row { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid var(--line-soft); }
.sum-row:last-child { border-bottom: none; }
.sum-ex { font-size: 13px; font-weight: 700; flex: 1; min-width: 0; color: var(--text); }
.sum-prog { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; white-space: nowrap; }
.sum-to { color: var(--text); font-weight: 700; }
.sum-arrow { opacity: .6; }
.sum-badges { display: flex; gap: 5px; flex-shrink: 0; }
.sum-gain { font-size: 12px; font-weight: 800; border-radius: 8px; padding: 3px 8px; font-variant-numeric: tabular-nums; }
.sum-gain.up { color: #fff; background: var(--blue-grad); }
.sum-gain.down { color: var(--muted); background: var(--surface2); }
.sum-gain.reps { color: #fff; background: var(--coral-grad); }
.sum-empty { font-size: 13px; line-height: 1.55; color: var(--muted); }

.modal-backdrop { position: fixed; inset: 0; z-index: 40; background: rgba(31,42,61,.35); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); display: flex; align-items: flex-end; justify-content: center; animation: fadeIn .2s ease both; }
.modal { width: 100%; max-width: 520px; max-height: 88vh; overflow-y: auto; background: var(--surface); border: 1px solid var(--line); border-radius: 24px 24px 0 0; padding: 12px 18px calc(20px + env(safe-area-inset-bottom)); animation: slideUp .3s cubic-bezier(.2,.8,.2,1) both; box-shadow: 0 -10px 40px rgba(31,60,120,.15); }
.modal-grab { width: 40px; height: 4px; border-radius: 99px; background: var(--line); margin: 0 auto 14px; }
.modal-title { font-weight: 800; font-size: 18px; margin-bottom: 14px; letter-spacing: -0.02em; color: var(--text); }
.f-label { display: block; font-size: 12px; font-weight: 700; color: var(--muted); margin: 11px 0 6px; }
.f-input { width: 100%; background: var(--surface2); border: 1px solid var(--line); border-radius: 12px; color: var(--text); font-weight: 700; font-size: 16px; padding: 12px 13px; }
.f-input:focus { outline: 2px solid var(--blue); }
.f-input.area { resize: none; line-height: 1.45; font-weight: 600; font-size: 14px; }
.f-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; margin-top: 20px; flex-wrap: wrap; }
.modal-actions-right { display: flex; gap: 8px; margin-left: auto; }
.m-btn { padding: 13px 17px; border-radius: 14px; border: 1px solid var(--line); background: var(--surface2); color: var(--text); font-weight: 800; font-size: 14px; cursor: pointer; }
.m-btn.primary { background: var(--blue-grad); border-color: transparent; color: #fff; box-shadow: var(--glow-blue); }
.m-btn.primary:disabled { opacity: .4; cursor: default; box-shadow: none; }
.m-btn.ghost { background: none; color: var(--muted); }
.m-btn.danger { background: #DC2626; border-color: #DC2626; color: #fff; }

.overlay {
  position: fixed; inset: 0; z-index: 50;
  background: radial-gradient(900px 420px at 50% -150px, rgba(86,170,255,.2), transparent 60%), var(--bg);
  color: var(--text); display: flex; flex-direction: column; align-items: center;
  padding: 18px 20px calc(24px + env(safe-area-inset-bottom));
  overflow-y: auto;
  font-family: "Inter", -apple-system, "Segoe UI", Roboto, system-ui, sans-serif;
  animation: fadeIn .22s ease both;
}
.ov-top { width: 100%; max-width: 520px; position: relative; text-align: center; padding-top: 6px; flex-shrink: 0; }
.ov-close { position: absolute; left: 0; top: 0; width: 42px; height: 42px; border-radius: 13px; border: 1px solid var(--line); background: var(--surface); color: var(--muted); font-size: 16px; font-weight: 800; cursor: pointer; box-shadow: 0 2px 6px rgba(31,60,120,.06); }
.ov-exname { font-size: 21px; font-weight: 800; letter-spacing: -0.025em; padding: 8px 48px 0; color: var(--text); }
.ov-sub { font-size: 13px; color: var(--blue); font-weight: 700; margin-top: 4px; }
.ov-dots { display: flex; gap: 9px; margin: 20px 0 6px; flex-shrink: 0; }
.ov-dot { width: 12px; height: 12px; border-radius: 99px; background: var(--surface); border: 1.5px solid var(--line); transition: all .25s ease; }
.ov-dot.done { background: var(--blue-grad); border-color: transparent; box-shadow: 0 0 8px rgba(45,127,249,.45); }
.ov-dot.cur { border-color: var(--blue); box-shadow: 0 0 0 4px rgba(45,127,249,.18); }
.ov-body { flex: 1; width: 100%; max-width: 520px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 4px; padding: 10px 0; }
.ov-body.anim { animation: rise .35s cubic-bezier(.2,.8,.2,1) both; }
.ov-label { font-size: 12px; font-weight: 900; color: var(--muted); text-transform: uppercase; letter-spacing: .14em; }
.ov-label.rest { color: var(--coral); }
.ov-big { font-size: 92px; font-weight: 900; line-height: 1; letter-spacing: -0.05em; font-variant-numeric: tabular-nums; color: var(--text); }
.ov-of { font-size: 30px; color: var(--muted2); font-weight: 800; margin-left: 6px; letter-spacing: -0.02em; }
.ov-trophy { font-size: 64px; animation: trophy .55s cubic-bezier(.2,.8,.3,1.2) both; }
.ov-target { font-size: 17px; font-weight: 700; color: var(--text); margin-top: 10px; }
.ov-target-num { color: var(--blue); font-size: 23px; font-weight: 900; }
.ov-stopwatch {
  margin-top: 16px; display: inline-flex; align-items: center; gap: 9px;
  font-size: 26px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  color: var(--text); background: var(--surface); border: 1px solid var(--line);
  border-radius: 99px; padding: 10px 22px;
  box-shadow: var(--shadow-card);
}
.ov-sw-dot { width: 10px; height: 10px; border-radius: 99px; background: var(--success); animation: blink 1.2s ease-in-out infinite; }
.ov-lastdur { margin-top: 14px; font-size: 14px; font-weight: 800; color: var(--text); background: var(--surface); border: 1px solid var(--line); border-radius: 99px; padding: 7px 16px; box-shadow: 0 2px 6px rgba(31,60,120,.06); }
.ov-tip { font-size: 13px; line-height: 1.55; color: var(--muted); max-width: 340px; margin-top: 14px; }
.ov-main { margin-top: 26px; width: 100%; max-width: 360px; padding: 18px 0; border-radius: 17px; border: none; background: var(--blue-grad); color: #fff; font-weight: 800; font-size: 17px; cursor: pointer; box-shadow: var(--glow-blue); }
.ov-main.secondary { background: var(--surface); color: var(--text); border: 1px solid var(--line); margin-top: 10px; box-shadow: 0 2px 6px rgba(31,60,120,.06); }
.ov-ring-wrap { position: relative; margin-top: 14px; }
.ov-ring-wrap.pulsing { animation: pulseRing 2s ease-in-out infinite; }
.ov-ring-time { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 38px; font-weight: 900; font-variant-numeric: tabular-nums; letter-spacing: -0.03em; color: var(--text); }
.ov-next { font-size: 14px; font-weight: 700; color: var(--muted); margin-top: 16px; }
.ov-rest-controls { display: flex; gap: 10px; margin-top: 18px; }
.ov-done-title { font-size: 25px; font-weight: 900; letter-spacing: -0.03em; margin-top: 10px; color: var(--text); }
.ov-durs { display: flex; flex-wrap: wrap; gap: 7px; justify-content: center; margin-top: 14px; max-width: 360px; }
.ov-dur { font-size: 12px; font-weight: 800; color: var(--blue); background: rgba(45,127,249,.08); border: 1px solid rgba(45,127,249,.25); border-radius: 99px; padding: 5px 11px; font-variant-numeric: tabular-nums; }
.ov-reps { margin-top: 18px; padding: 15px; background: var(--surface); border: 1px solid var(--line); border-radius: 17px; display: flex; align-items: center; gap: 14px; justify-content: space-between; width: 100%; max-width: 360px; box-shadow: var(--shadow-card); }
.ov-reps-label { font-size: 13px; font-weight: 700; text-align: left; display: flex; flex-direction: column; gap: 2px; color: var(--text); }

.sess { justify-content: flex-start; }
.sess-actions { display: flex; gap: 9px; margin: 16px 0 4px; width: 100%; max-width: 520px; justify-content: center; flex-shrink: 0; }
.sess-list { width: 100%; max-width: 520px; padding-top: 10px; }
.sess-empty { padding: 44px 16px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.7; }
.sess-group { margin-bottom: 16px; background: var(--surface); border: 1px solid var(--line); border-radius: 18px; padding: 13px 14px; box-shadow: var(--shadow-card); }
.sess-date { font-size: 12px; font-weight: 900; color: var(--blue); text-transform: capitalize; letter-spacing: .03em; margin-bottom: 6px; }
.sess-row { display: flex; align-items: center; gap: 11px; padding: 9px 0; border-bottom: 1px solid var(--line-soft); }
.sess-row:last-child { border-bottom: none; }
.sess-time { font-size: 12px; font-weight: 700; color: var(--muted); width: 42px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
.sess-main { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 1px; }
.sess-ex { font-size: 13.5px; font-weight: 800; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sess-detail { font-size: 11.5px; font-weight: 600; color: var(--muted); }
.sess-dur { font-size: 13px; font-weight: 900; color: var(--coral); font-variant-numeric: tabular-nums; flex-shrink: 0; }

.toast { position: fixed; bottom: calc(96px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%); z-index: 110; background: var(--text); border: none; color: #fff; font-size: 13px; font-weight: 700; padding: 11px 18px; border-radius: 99px; white-space: nowrap; box-shadow: 0 8px 30px rgba(31,42,61,.35); animation: toastIn .25s cubic-bezier(.2,.8,.2,1) both; }
.confetti { position: fixed; inset: 0; z-index: 100; pointer-events: none; overflow: hidden; }
.cf { position: absolute; top: -20px; border-radius: 2px; animation: cfFall linear both; }

@media (prefers-reduced-motion: reduce) {
  *, .bar-fill, .ring-fg, .dot, .day-btn, .rise, .rise-fast { animation: none !important; transition: none !important; }
}
`;

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
